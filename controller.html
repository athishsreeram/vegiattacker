<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🎮 Veggie Attack Controller</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
:root {
  --yellow: #ffd700;
  --green:  #00ff87;
  --pink:   #ff2d78;
  --cyan:   #00d4ff;
  --purple: #a855f7;
  --orange: #ff6b35;
  --dark:   #0d0d1a;
}
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0d0d1a;
  font-family: 'Fredoka One', cursive;
  color: #fff;
}

/* ─── ENTRY SCREEN ─────────────────────────────── */
#entry-screen {
  position: fixed; inset: 0; z-index: 100;
  background: radial-gradient(ellipse at 40% 30%, #1a1a4e 0%, #0d0d1a 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 22px; padding: 28px;
}
#entry-screen h1 {
  font-size: clamp(30px,8vw,52px);
  color: var(--yellow);
  text-shadow: 0 0 30px rgba(255,215,0,.7), 0 4px 0 rgba(100,60,0,.8);
  margin: 0; text-align: center;
}
.entry-sub {
  font-size: clamp(14px,4vw,18px);
  color: rgba(255,255,255,.65); text-align: center;
}
.code-input-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  width: 100%; max-width: 320px;
}
#code-input {
  width: 100%;
  background: rgba(255,255,255,.08);
  border: 3px solid rgba(255,215,0,.4);
  border-radius: 18px;
  padding: 14px 20px;
  font-size: clamp(32px,10vw,48px);
  font-family: 'Fredoka One', monospace;
  color: var(--yellow);
  text-align: center;
  letter-spacing: 8px;
  outline: none;
  text-transform: uppercase;
  caret-color: var(--yellow);
}
#code-input:focus { border-color: var(--yellow); box-shadow: 0 0 24px rgba(255,215,0,.3); }
#code-input::placeholder { color: rgba(255,215,0,.25); letter-spacing:4px; }
#connect-btn {
  width: 100%;
  background: linear-gradient(145deg,#ff2d78,#a855f7);
  border: 3px solid rgba(255,255,255,.35);
  border-radius: 22px; padding: 16px;
  font-size: clamp(22px,6vw,32px); font-family: 'Fredoka One', cursive;
  color: #fff; cursor: pointer;
  box-shadow: 0 7px 0 rgba(100,0,60,.8), 0 10px 28px rgba(255,45,120,.4);
  transition: transform .08s, box-shadow .08s;
}
#connect-btn:active { transform: translateY(4px); box-shadow: 0 3px 0 rgba(100,0,60,.8); }
#connect-btn:disabled { opacity: .5; }
.entry-status {
  font-size: 15px; color: rgba(255,255,255,.55); text-align: center;
  min-height: 20px;
}
.entry-status.err  { color: #ff6b6b; }
.entry-status.ok   { color: var(--green); }
.entry-status.busy { color: var(--yellow); }

/* ─── CONTROLLER SCREEN ─────────────────────────── */
#ctrl-screen {
  display: none; flex-direction: column;
  width: 100%; height: 100dvh;
  position: relative; overflow: hidden;
  background: radial-gradient(ellipse at 50% 0%, #1a1a4e 0%, #0d0d1a 70%);
}
#ctrl-screen.show { display: flex; }

/* Status bar */
#ctrl-status-bar {
  height: 44px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  background: rgba(0,0,0,.35);
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sbar-left { display:flex; align-items:center; gap:8px; font-size:14px; color:rgba(255,255,255,.6); }
.s-dot { width:9px; height:9px; border-radius:50%; background:var(--green); box-shadow:0 0 7px var(--green); }
.s-dot.dc { background:#ff4444; box-shadow:0 0 7px #ff4444; }
#ctrl-score-badge {
  background: rgba(255,215,0,.15); border:1.5px solid rgba(255,215,0,.3);
  border-radius:12px; padding:2px 12px;
  font-size:15px; color:var(--yellow);
}
#ctrl-code-badge {
  font-size:12px; color:rgba(255,255,255,.35); letter-spacing:2px;
}

/* Action area */
#action-display {
  flex: 0 0 auto;
  min-height: 120px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 16px 6px;
  position: relative;
}
#action-bg-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 60%, rgba(255,215,0,.12) 0%, transparent 70%);
  pointer-events: none;
}
#curr-action-emoji {
  font-size: clamp(44px,13vw,72px);
  display: block; line-height: 1.1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
  animation: emojiPulse .7s ease infinite alternate;
}
@keyframes emojiPulse {
  from { transform:scale(1); }
  to   { transform:scale(1.08); }
}
#curr-action-word {
  font-size: clamp(28px,9vw,52px);
  color: var(--yellow);
  text-shadow: 0 0 20px rgba(255,215,0,.7), 0 3px 0 rgba(100,60,0,.8);
  letter-spacing: 2px; line-height: 1.1;
}
.action-hint {
  font-size: clamp(12px,3.5vw,16px);
  color: rgba(255,255,255,.4); margin-top: 2px;
  animation: hintBlink 1s ease infinite alternate;
}
@keyframes hintBlink { from{opacity:.4;} to{opacity:.9;} }

/* Timer bar */
#timer-bar-wrap {
  padding: 0 20px; flex-shrink: 0;
}
#timer-bar-bg {
  width: 100%; height: 8px; border-radius: 4px;
  background: rgba(255,255,255,.1); overflow: hidden;
}
#timer-bar-fill {
  height: 100%; width: 100%; border-radius: 4px;
  background: var(--cyan);
  transform-origin: left;
  transition: width .08s linear, background .3s;
}

/* Divider */
.divider {
  height: 1px; margin: 8px 16px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
  flex-shrink: 0;
}

/* Button grid */
#btn-grid {
  flex: 1; overflow: hidden;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 9px;
  padding: 6px 12px 10px;
}

.act-btn {
  background: linear-gradient(145deg, var(--ca), var(--cb));
  border: 3px solid rgba(255,255,255,.3);
  border-radius: 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; position: relative; overflow: hidden;
  box-shadow: 0 6px 0 var(--cs), 0 8px 18px rgba(0,0,0,.3);
  transition: transform .06s, box-shadow .06s;
}
.act-btn::after {
  content:''; position:absolute;
  top:0; left:0; right:0; height:38%;
  background: rgba(255,255,255,.16);
  border-radius: 17px 17px 50% 50%;
}
.act-btn:active, .act-btn.pressed {
  transform: translateY(5px) scale(0.94);
  box-shadow: 0 1px 0 var(--cs), 0 3px 8px rgba(0,0,0,.3);
}
.act-btn.is-target {
  animation: targetGlow .55s ease infinite alternate;
  border-color: var(--yellow) !important;
}
@keyframes targetGlow {
  from { box-shadow:0 6px 0 var(--cs), 0 0 16px rgba(255,215,0,.4); }
  to   { box-shadow:0 6px 0 var(--cs), 0 0 36px rgba(255,215,0,.9); }
}
.act-btn.correct-flash { animation: correctFlash .4s ease !important; }
@keyframes correctFlash {
  0%,100% { transform:scale(1); }
  40% { transform:scale(1.18) rotate(-4deg); }
  70% { transform:scale(1.12) rotate(3deg); }
}
.act-btn.wrong-shake { animation: wrongShake .35s ease !important; }
@keyframes wrongShake {
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-7px);}
  50%{transform:translateX(7px);}
  75%{transform:translateX(-4px);}
}
.btn-e { font-size: clamp(22px,6vw,34px); line-height:1; position:relative; z-index:1; }
.btn-l { font-size: clamp(9px,2.8vw,14px); color:rgba(255,255,255,.88); position:relative; z-index:1; letter-spacing:.4px; }

/* Feedback overlay */
#fb-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
  font-size: clamp(40px,12vw,72px);
  text-shadow: 0 0 30px rgba(255,255,255,.5);
  font-family: 'Fredoka One', cursive;
  transition: opacity .15s;
}
#fb-overlay.show { opacity: 1; animation: fbOverlay .45s ease; }
@keyframes fbOverlay {
  0%   { transform:scale(.5); opacity:0; }
  60%  { transform:scale(1.1); opacity:1; }
  100% { transform:scale(1); }
}
#fb-overlay.hit  { color: var(--yellow); background:radial-gradient(circle, rgba(255,215,0,.25) 0%, transparent 60%); }
#fb-overlay.miss { color: #ff6b6b;       background:radial-gradient(circle, rgba(255,80,80,.2) 0%, transparent 60%); }

/* Disconnected screen */
#dc-screen {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,.88); backdrop-filter: blur(8px);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
  padding: 24px;
}
#dc-screen.show { display: flex; }
#dc-screen .dc-msg {
  font-size: clamp(22px,7vw,38px); color: var(--yellow);
  text-align: center;
  text-shadow: 0 0 20px rgba(255,215,0,.5);
}
#dc-screen .dc-sub { font-size:clamp(14px,4.5vw,20px); color:rgba(255,255,255,.55); text-align:center; }
#rejoin-btn {
  background: linear-gradient(145deg,#ff2d78,#a855f7);
  border: 3px solid rgba(255,255,255,.3); border-radius:22px;
  padding: 14px 36px; font-size:clamp(18px,5.5vw,28px);
  font-family:'Fredoka One',cursive; color:#fff; cursor:pointer;
  box-shadow: 0 6px 0 rgba(100,0,60,.8);
  touch-action: manipulation;
}
#rejoin-btn:active { transform:translateY(4px); }
</style>
</head>
<body>

<!-- ── ENTRY ── -->
<div id="entry-screen">
  <div style="font-size:clamp(40px,12vw,64px)">🎮</div>
  <h1>Veggie Attack!<br>Controller</h1>
  <div class="entry-sub">Enter the room code shown on the game screen</div>

  <div class="code-input-wrap">
    <input id="code-input" type="text" maxlength="4"
           placeholder="AB12" autocomplete="off"
           autocorrect="off" autocapitalize="characters" spellcheck="false"/>
    <button id="connect-btn">Connect 🎮</button>
    <div class="entry-status" id="entry-status"></div>
  </div>
</div>

<!-- ── CONTROLLER ── -->
<div id="ctrl-screen">

  <!-- Status bar -->
  <div id="ctrl-status-bar">
    <div class="sbar-left">
      <div class="s-dot" id="s-dot"></div>
      <span id="s-text">Connected</span>
    </div>
    <div id="ctrl-code-badge">ROOM: <span id="room-label">····</span></div>
    <div id="ctrl-score-badge">⭐ <span id="ctrl-score">0</span></div>
  </div>

  <!-- Current action display -->
  <div id="action-display">
    <div id="action-bg-glow"></div>
    <span id="curr-action-emoji">❓</span>
    <span id="curr-action-word">Waiting…</span>
    <span class="action-hint" id="action-hint">Tap the matching button! 👇</span>
  </div>

  <!-- Timer bar -->
  <div id="timer-bar-wrap">
    <div id="timer-bar-bg">
      <div id="timer-bar-fill"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Button grid -->
  <div id="btn-grid"></div>

  <!-- Feedback overlay -->
  <div id="fb-overlay"></div>

  <!-- Disconnected -->
  <div id="dc-screen">
    <div class="dc-msg">📺 Game disconnected</div>
    <div class="dc-sub">The game screen was closed<br>or lost connection.</div>
    <button id="rejoin-btn" onclick="showEntry()">← Back to Entry</button>
  </div>

</div>

<script>
// ════════════════════════════════════════════════════════
//  ACTIONS DATA (same 12 as game screen)
// ════════════════════════════════════════════════════════
const ACTIONS = [
  { id:'punch', word:'PUNCH!', emoji:'👊', btn:'👊', label:'Punch'  },
  { id:'smash', word:'SMASH!', emoji:'💥', btn:'💥', label:'Smash'  },
  { id:'chop',  word:'CHOP!',  emoji:'🪓', btn:'🪓', label:'Chop'   },
  { id:'stomp', word:'STOMP!', emoji:'👣', btn:'👣', label:'Stomp'  },
  { id:'kick',  word:'KICK!',  emoji:'🦵', btn:'🦵', label:'Kick'   },
  { id:'jump',  word:'JUMP!',  emoji:'⬆️', btn:'⬆️', label:'Jump'   },
  { id:'duck',  word:'DUCK!',  emoji:'⬇️', btn:'⬇️', label:'Duck'   },
  { id:'block', word:'BLOCK!', emoji:'🛡️', btn:'🛡️', label:'Block'  },
  { id:'pull',  word:'PULL!',  emoji:'🤏', btn:'🤏', label:'Pull'   },
  { id:'spin',  word:'SPIN!',  emoji:'🔄', btn:'🔄', label:'Spin'   },
  { id:'slap',  word:'SLAP!',  emoji:'🖐️', btn:'🖐️', label:'Slap'   },
  { id:'wave',  word:'WAVE!',  emoji:'👋', btn:'👋', label:'Wave'   },
];

const BTN_STYLES = [
  ['#ff6b35','#cc4400','#7a2200'],
  ['#ff2d78','#aa0044','#660022'],
  ['#ffd700','#aa8800','#665500'],
  ['#a855f7','#6600cc','#330077'],
  ['#00d4ff','#0088cc','#005580'],
  ['#00ff87','#00aa55','#006633'],
  ['#ff9900','#cc6600','#7a3300'],
  ['#ff55cc','#aa0088','#660055'],
];

// ════════════════════════════════════════════════════════
//  AUDIO
// ════════════════════════════════════════════════════════
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function beep(type) {
  try {
    const ctx=getCtx(); const now=ctx.currentTime;
    const o=ctx.createOscillator(); const g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (type==='tap') {
      o.type='sine'; o.frequency.setValueAtTime(600,now); o.frequency.exponentialRampToValueAtTime(300,now+.08);
      g.gain.setValueAtTime(.35,now); g.gain.exponentialRampToValueAtTime(.001,now+.1);
      o.start(); o.stop(now+.1);
    } else if (type==='hit') {
      [523,659,784].forEach((fr,i)=>{
        const oc=ctx.createOscillator(); const gc=ctx.createGain();
        oc.connect(gc); gc.connect(ctx.destination); oc.type='sine'; oc.frequency.value=fr;
        gc.gain.setValueAtTime(0,now+i*.04); gc.gain.linearRampToValueAtTime(.3,now+i*.04+.02); gc.gain.exponentialRampToValueAtTime(.001,now+i*.04+.25);
        oc.start(now+i*.04); oc.stop(now+i*.04+.25);
      });
      o.start(); o.stop(now+.01);
    } else if (type==='miss') {
      o.type='square'; o.frequency.setValueAtTime(220,now); o.frequency.setValueAtTime(160,now+.1);
      g.gain.setValueAtTime(.35,now); g.gain.exponentialRampToValueAtTime(.001,now+.25);
      o.start(); o.stop(now+.25);
    } else if (type==='connect') {
      [400,600,800].forEach((fr,i)=>{
        const oc=ctx.createOscillator(); const gc=ctx.createGain();
        oc.connect(gc); gc.connect(ctx.destination); oc.type='sine'; oc.frequency.value=fr;
        gc.gain.setValueAtTime(0,now+i*.07); gc.gain.linearRampToValueAtTime(.25,now+i*.07+.02); gc.gain.exponentialRampToValueAtTime(.001,now+i*.07+.2);
        oc.start(now+i*.07); oc.stop(now+i*.07+.2);
      });
      o.start(); o.stop(now+.01);
    } else { o.start(); o.stop(now+.01); }
  } catch(e) {}
}
function vibe(p) { try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }

// ════════════════════════════════════════════════════════
//  BUILD BUTTONS
// ════════════════════════════════════════════════════════
let currentTargetId = null;

function buildButtons() {
  const grid = document.getElementById('btn-grid');
  grid.innerHTML = '';
  // Shuffle and take 8
  const shuffled = [...ACTIONS].sort(()=>Math.random()-.5).slice(0,8);
  // Ensure current target is in there
  if (currentTargetId && !shuffled.find(a=>a.id===currentTargetId)) {
    shuffled[Math.floor(Math.random()*8)] = ACTIONS.find(a=>a.id===currentTargetId) || shuffled[0];
  }

  shuffled.forEach((action,idx)=>{
    const [ca,cb,cs] = BTN_STYLES[idx % BTN_STYLES.length];
    const btn = document.createElement('button');
    btn.className = 'act-btn';
    btn.id = 'abtn-'+action.id;
    btn.dataset.id = action.id;
    btn.style.setProperty('--ca',ca);
    btn.style.setProperty('--cb',cb);
    btn.style.setProperty('--cs',cs);
    btn.innerHTML = `<span class="btn-e">${action.btn}</span><span class="btn-l">${action.label}</span>`;

    btn.addEventListener('touchstart', (e)=>{ e.preventDefault(); onBtnTap(action.id, btn); }, { passive:false });
    btn.addEventListener('mousedown', ()=>onBtnTap(action.id, btn));

    grid.appendChild(btn);
  });

  highlightTarget();
}

function highlightTarget() {
  document.querySelectorAll('.act-btn').forEach(b=>b.classList.remove('is-target'));
  if (currentTargetId) {
    const t = document.getElementById('abtn-'+currentTargetId);
    if (t) t.classList.add('is-target');
  }
}

// ════════════════════════════════════════════════════════
//  PEERJS SETUP
// ════════════════════════════════════════════════════════
let peer = null;
let conn = null;
let roomCode = '';

// Auto-fill room code from URL param
(function checkUrlParam() {
  const p = new URLSearchParams(window.location.search).get('room');
  if (p) {
    document.getElementById('code-input').value = p.toUpperCase();
    // Auto-connect after slight delay
    setTimeout(doConnect, 600);
  }
})();

document.getElementById('connect-btn').addEventListener('click', doConnect);
document.getElementById('code-input').addEventListener('keydown', (e)=>{
  if (e.key==='Enter') doConnect();
});
document.getElementById('code-input').addEventListener('input', (e)=>{
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
});

function doConnect() {
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  if (code.length !== 4) {
    setEntryStatus('Enter a 4-character room code', 'err');
    return;
  }
  roomCode = code;
  setEntryStatus('Connecting…', 'busy');
  document.getElementById('connect-btn').disabled = true;

  // Init peer with random ID
  const myId = 'CTRL-' + Math.random().toString(36).substr(2,8).toUpperCase();

  if (peer) { try{ peer.destroy(); }catch(e){} }
  peer = new Peer(myId, {
    debug: 0,
    config: {
      iceServers: [
        { urls:'stun:stun.l.google.com:19302' },
        { urls:'stun:stun1.l.google.com:19302' },
      ]
    }
  });

  peer.on('open', ()=>{
    setEntryStatus('Reaching game screen…', 'busy');
    const targetId = 'VEGGIE-' + roomCode;
    conn = peer.connect(targetId, { reliable:true, serialization:'json' });
    setupConn(conn);
  });

  peer.on('error', (err)=>{
    console.error('Peer error:', err);
    setEntryStatus('Connection failed: ' + err.type, 'err');
    document.getElementById('connect-btn').disabled = false;
  });
}

function setupConn(c) {
  c.on('open', ()=>{
    setEntryStatus('Connected! 🎉', 'ok');
    beep('connect');
    vibe([30,20,60]);
    document.getElementById('room-label').textContent = roomCode;
    setTimeout(()=>{
      document.getElementById('entry-screen').style.display = 'none';
      document.getElementById('ctrl-screen').classList.add('show');
      document.getElementById('s-dot').className = 's-dot';
      document.getElementById('s-text').textContent = 'Connected · Room '+roomCode;
      buildButtons();
    }, 400);
  });

  c.on('data', (data)=>{
    if (data.type==='round') {
      onNewRound(data);
    } else if (data.type==='feedback') {
      onFeedback(data);
    }
  });

  c.on('close', ()=>{
    console.log('Game disconnected');
    conn = null;
    clearTimerBar();
    document.getElementById('s-dot').className = 's-dot dc';
    document.getElementById('s-text').textContent = 'Disconnected';
    document.getElementById('dc-screen').classList.add('show');
  });

  c.on('error', (err)=>{
    console.error('Conn error:', err);
    document.getElementById('dc-screen').classList.add('show');
  });
}

// ════════════════════════════════════════════════════════
//  GAME EVENTS
// ════════════════════════════════════════════════════════
let timerAnim = null;
let timerStart = null;
let timerDuration = 3500;

function onNewRound(data) {
  currentTargetId = data.actionId;

  // Update action display
  document.getElementById('curr-action-emoji').textContent = data.actionEmoji || '❓';
  document.getElementById('curr-action-word').textContent  = data.actionWord  || '?';
  document.getElementById('action-hint').textContent = 'Tap the matching button! 👇';

  buildButtons();
  startTimerBar(3.5);
}

function onFeedback(data) {
  document.getElementById('ctrl-score').textContent = data.score || 0;
  if (data.result==='hit') {
    showFbOverlay('🎉 NICE!', 'hit');
    beep('hit');
    vibe([30,20,80]);
    flashScreen('#00ff87');
  } else if (data.result==='miss' || data.result==='wrong') {
    showFbOverlay(data.result==='miss'?"⏰ Too slow!":'❌ Wrong!', 'miss');
    beep('miss');
    vibe([120,40,120]);
    flashScreen('#ff4444');
  }
  clearTimerBar();
}

function onBtnTap(actionId, btn) {
  beep('tap');
  vibe(40);
  btn.classList.add('pressed');
  setTimeout(()=>btn.classList.remove('pressed'), 120);

  // Send to game screen
  if (conn && conn.open) {
    try { conn.send({ type:'action', id:actionId }); } catch(e) {}
  }

  // Local visual feedback
  if (actionId === currentTargetId) {
    btn.classList.add('correct-flash');
    setTimeout(()=>btn.classList.remove('correct-flash'), 500);
  } else {
    btn.classList.add('wrong-shake');
    setTimeout(()=>btn.classList.remove('wrong-shake'), 400);
  }
}

// ════════════════════════════════════════════════════════
//  TIMER BAR
// ════════════════════════════════════════════════════════
function startTimerBar(seconds) {
  clearTimerBar();
  const fill = document.getElementById('timer-bar-fill');
  fill.style.width = '100%';
  fill.style.background = 'var(--cyan)';
  timerDuration = seconds * 1000;
  timerStart = performance.now();

  function tick(now) {
    const elapsed = now - timerStart;
    const ratio = Math.max(0, 1 - elapsed / timerDuration);
    fill.style.width = (ratio*100) + '%';
    if (ratio < .35) fill.style.background = '#ff2d78';
    else if (ratio < .6) fill.style.background = '#ffd700';
    else fill.style.background = 'var(--cyan)';
    if (ratio > 0) timerAnim = requestAnimationFrame(tick);
    else fill.style.width = '0%';
  }
  timerAnim = requestAnimationFrame(tick);
}

function clearTimerBar() {
  if (timerAnim) cancelAnimationFrame(timerAnim);
  timerAnim = null;
  const fill = document.getElementById('timer-bar-fill');
  fill.style.width = '100%';
  fill.style.background = 'var(--cyan)';
}

// ════════════════════════════════════════════════════════
//  FEEDBACK OVERLAY
// ════════════════════════════════════════════════════════
let fbTimer = null;
function showFbOverlay(msg, type) {
  const el = document.getElementById('fb-overlay');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(fbTimer);
  fbTimer = setTimeout(()=>{ el.className=''; }, 700);
}

function flashScreen(color) {
  document.body.style.background = color;
  setTimeout(()=>{ document.body.style.background = ''; }, 120);
}

// ════════════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════════════
function showEntry() {
  document.getElementById('dc-screen').classList.remove('show');
  document.getElementById('ctrl-screen').classList.remove('show');
  document.getElementById('entry-screen').style.display = 'flex';
  document.getElementById('connect-btn').disabled = false;
  setEntryStatus('', '');
  if (peer) { try{ peer.destroy(); }catch(e){} peer=null; }
  conn = null;
}

function setEntryStatus(msg, type) {
  const el = document.getElementById('entry-status');
  el.textContent = msg;
  el.className = 'entry-status ' + type;
}

// Prevent zoom, context menu
document.addEventListener('contextmenu', e=>e.preventDefault());
document.addEventListener('touchstart', (e)=>{ if(e.touches.length>1) e.preventDefault(); },{ passive:false });

// Unlock audio on first touch
document.body.addEventListener('touchstart',()=>{ try{getCtx();}catch(e){} },{ once:true });
document.body.addEventListener('click',()=>{ try{getCtx();}catch(e){} },{ once:true });

// WakeLock — prevent screen sleep on controller
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
    }
  } catch(e) {}
}
requestWakeLock();
</script>
