<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Veggie Attack! 🥕⚡ Multiplayer</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
:root{
  --y:#ffd700;--g:#00ff87;--pk:#ff2d78;--cy:#00d4ff;--pu:#a855f7;
  --p1:#ff4444;--p2:#4499ff;--p3:#ffcc00;--p4:#cc44ff;
  --p1b:rgba(255,68,68,.18);--p2b:rgba(68,153,255,.18);--p3b:rgba(255,204,0,.18);--p4b:rgba(204,68,255,.18);
}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;
  background:#0d0d1a;font-family:'Fredoka One',cursive;color:#fff;}

/* STARS */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:1;transform:scale(1);}}

/* ═══════════════════════════════════════════
   SCREEN SYSTEM
═══════════════════════════════════════════ */
.screen{position:fixed;inset:0;z-index:50;display:none;}
.screen.active{display:flex;}

/* ═══════════════════════════════════════════
   PAIRING / LOBBY SCREEN
═══════════════════════════════════════════ */
#s-pair{
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:20px;
  background:radial-gradient(ellipse at 40% 30%,#1a1a5e 0%,#0d0d1a 100%);
}
#s-pair h1{
  font-size:clamp(28px,5vw,60px);color:var(--y);margin:0;text-align:center;
  text-shadow:0 0 40px rgba(255,215,0,.7),0 5px 0 rgba(100,60,0,.8);
  animation:tfl 2s ease infinite alternate;
}
@keyframes tfl{from{transform:translateY(0);}to{transform:translateY(-7px);}}
.vrow{font-size:clamp(24px,4vw,46px);animation:vp 1.5s ease infinite alternate;}
@keyframes vp{from{transform:rotate(-3deg);}to{transform:rotate(3deg) translateY(-5px);}}

.pair-card{
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.14);
  border-radius:22px;padding:18px 24px;display:flex;gap:22px;align-items:center;
  backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.4);
  flex-wrap:wrap;justify-content:center;max-width:620px;width:100%;
}
#qrwrap{background:#fff;border-radius:12px;padding:8px;width:132px;height:132px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(255,215,0,.3);}
.pmeta{display:flex;flex-direction:column;align-items:center;gap:8px;}
#room-code{
  font-size:clamp(38px,6.5vw,70px);color:var(--y);letter-spacing:8px;
  text-shadow:0 0 30px rgba(255,215,0,.8),0 4px 0 rgba(100,60,0,.9);
  background:rgba(0,0,0,.3);border:3px solid rgba(255,215,0,.4);
  border-radius:14px;padding:4px 18px;
  animation:cp 2s ease infinite alternate;
}
@keyframes cp{from{box-shadow:0 0 14px rgba(255,215,0,.2);}to{box-shadow:0 0 34px rgba(255,215,0,.6);}}
.plabel{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.5px;}
.pstat-row{display:flex;align-items:center;gap:7px;font-size:13px;
  color:rgba(255,255,255,.55);background:rgba(0,0,0,.3);border-radius:16px;padding:4px 12px;}
.pdot{width:9px;height:9px;border-radius:50%;background:#ff4444;box-shadow:0 0 6px #ff4444;transition:.4s;}
.pdot.w{background:var(--y);box-shadow:0 0 7px var(--y);animation:db .7s ease infinite alternate;}
.pdot.ok{background:var(--g);box-shadow:0 0 7px var(--g);animation:none;}
@keyframes db{from{opacity:1;}to{opacity:.3;}}

/* Lobby player slots */
#lobby-slots{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.pslot{
  width:clamp(70px,12vw,96px);background:rgba(255,255,255,.05);
  border:2px dashed rgba(255,255,255,.18);border-radius:14px;
  padding:8px 4px;text-align:center;transition:.4s;
}
.pslot.filled{background:rgba(255,255,255,.1);border-style:solid;}
.pslot.c1{border-color:var(--p1);} .pslot.c2{border-color:var(--p2);}
.pslot.c3{border-color:var(--p3);} .pslot.c4{border-color:var(--p4);}
.pslot .sav{font-size:clamp(20px,3vw,30px);}
.pslot .sname{font-size:clamp(9px,1.5vw,12px);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pslot .sempty{font-size:10px;color:rgba(255,255,255,.22);margin-top:4px;}

#start-btn{
  background:linear-gradient(145deg,#ff2d78,#a855f7);
  border:3px solid rgba(255,255,255,.3);border-radius:22px;
  padding:12px 36px;font-size:clamp(18px,3vw,28px);
  font-family:'Fredoka One',cursive;color:#fff;cursor:pointer;
  box-shadow:0 7px 0 rgba(100,0,60,.8),0 10px 28px rgba(255,45,120,.4);
  display:none;
}
#start-btn.show{display:block;}
#start-btn:active{transform:translateY(4px);box-shadow:0 3px 0 rgba(100,0,60,.8);}
#ctrl-url{font-size:clamp(9px,1.4vw,12px);color:rgba(255,255,255,.25);
  text-align:center;word-break:break-all;max-width:500px;}

/* ═══════════════════════════════════════════
   COUNTDOWN SCREEN
═══════════════════════════════════════════ */
#s-cd{
  flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.93);
}
#cdn{font-size:clamp(100px,22vw,200px);color:var(--y);
  text-shadow:0 0 60px rgba(255,215,0,.8),0 8px 0 rgba(100,60,0,.9);
  animation:cdpop .8s ease;}
@keyframes cdpop{0%{transform:scale(2.2);opacity:0;}60%{transform:scale(.88);}100%{transform:scale(1);opacity:1;}}
#cdmsg{font-size:clamp(18px,3.5vw,36px);color:rgba(255,255,255,.65);margin-top:8px;}

/* ═══════════════════════════════════════════
   GAME SCREEN — EXACT LAYOUT
   ┌────────────────────────────────┐
   │  ZONE 1: PLAYER HUD (top)      │  ~18%
   ├────────────────────────────────┤
   │  ZONE 2: ACTION + VEGGIE       │  ~44% (flex:1)
   ├────────────────────────────────┤
   │  ZONE 3: TIMER BAR             │  fixed 22px
   ├────────────────────────────────┤
   │  ZONE 4: AVATAR ROW + STATUS   │  ~20%
   └────────────────────────────────┘
═══════════════════════════════════════════ */
#s-game{
  flex-direction:column;padding:0;
  background:radial-gradient(ellipse at 30% 20%,#1a1a4e 0%,#0d0d1a 100%);
}

/* ── ZONE 1: PLAYER HUD ── */
#zone-hud{
  flex:0 0 auto;
  min-height:80px;max-height:110px;
  display:grid;/* cols set dynamically */
  gap:8px;padding:8px 10px;
  background:linear-gradient(180deg,rgba(0,0,0,.65) 0%,rgba(0,0,0,.1) 100%);
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.phud{
  border-radius:14px;
  display:flex;flex-direction:row;
  align-items:center;gap:8px;
  padding:6px 12px;
  border:2.5px solid rgba(255,255,255,.18);
  position:relative;overflow:hidden;
}
/* colored tint bg */
.phud::before{content:'';position:absolute;inset:0;opacity:.15;pointer-events:none;}
.phud.c1{border-color:var(--p1);}.phud.c1::before{background:var(--p1);}
.phud.c2{border-color:var(--p2);}.phud.c2::before{background:var(--p2);}
.phud.c3{border-color:var(--p3);}.phud.c3::before{background:var(--p3);}
.phud.c4{border-color:var(--p4);}.phud.c4::before{background:var(--p4);}
/* rank badge top-right */
.phud .hrank{
  position:absolute;top:3px;right:6px;
  font-size:clamp(9px,1.1vw,12px);opacity:.6;
}
/* freeze bar along bottom */
.phud .fbar{
  position:absolute;bottom:0;left:0;height:4px;
  background:var(--cy);width:0%;
}
.phud .hav{font-size:clamp(20px,2.8vw,32px);line-height:1;flex-shrink:0;}
.phud .hinfo{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;}
.phud .hname{
  font-size:clamp(10px,1.5vw,16px);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:.9;
}
.phud .hscore{
  font-size:clamp(18px,3vw,32px);line-height:1.1;
  color:#fff;
}
.phud .hpts{font-size:clamp(8px,1vw,11px);opacity:.55;margin-left:2px;}

/* HUD score pop animation */
.phud.score-pop{animation:scoreJump .35s ease;}
@keyframes scoreJump{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

/* ── ZONE 2: ACTION STAGE (center) ── */
#zone-stage{
  flex:1;
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  overflow:hidden;
  min-height:0;
}

/* Round + speed badges */
#rnd-badge{
  position:absolute;top:8px;left:12px;z-index:20;
  background:rgba(0,0,0,.45);border:1.5px solid rgba(255,255,255,.1);
  border-radius:9px;padding:3px 10px;font-size:13px;color:rgba(255,255,255,.4);
}
#spd-badge{
  position:absolute;top:8px;left:12px;z-index:21;
  background:rgba(0,0,0,.55);border:2px solid var(--cy);
  border-radius:9px;padding:3px 10px;font-size:13px;color:var(--cy);display:none;
}
#spd-badge.show{display:block;}

/* Timer ring (top-right corner of stage) */
#tring{position:absolute;top:8px;right:12px;z-index:20;width:60px;height:60px;display:none;}
#tring.show{display:block;}
#tring svg{transform:rotate(-90deg);}
#tc{fill:none;stroke:var(--cy);stroke-width:5;stroke-dasharray:163;stroke-dashoffset:0;stroke-linecap:round;transition:stroke-dashoffset .08s linear;}
#tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;}

/* Action prompt — large centered */
#action-prompt{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-54%);
  z-index:20;text-align:center;
  pointer-events:none;opacity:0;
  transition:opacity .25s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
#action-prompt.show{opacity:1;}
#pe{
  font-size:clamp(60px,12vw,120px);
  display:block;line-height:1;
  filter:drop-shadow(0 8px 20px rgba(0,0,0,.6));
  animation:efloat .8s ease infinite alternate;
}
@keyframes efloat{from{transform:translateY(0);}to{transform:translateY(-10px);}}
#pw{
  display:block;
  font-size:clamp(40px,8vw,90px);
  color:var(--y);letter-spacing:4px;
  text-shadow:0 0 30px rgba(255,215,0,.85),0 5px 0 rgba(100,60,0,.9);
  animation:wpulse .5s ease infinite alternate;
}
@keyframes wpulse{from{transform:scale(1);}to{transform:scale(1.07);}}

/* Flying veggie */
#vobj{
  position:absolute;
  font-size:56px;
  transform:scale(.08);opacity:0;
  pointer-events:none;z-index:14;
  will-change:transform,opacity;
  animation:vwob .4s ease infinite alternate;
}
@keyframes vwob{
  from{filter:drop-shadow(0 8px 24px rgba(0,0,0,.6)) rotate(-7deg);}
  to{filter:drop-shadow(0 8px 24px rgba(0,0,0,.6)) rotate(7deg);}
}

/* Round result toast */
#rtost{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:65;pointer-events:none;opacity:0;
  text-align:center;font-size:clamp(26px,5vw,52px);
  white-space:nowrap;
}
#rtost.show{animation:tostAnim .9s ease forwards;}
@keyframes tostAnim{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.4);}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}
  70%{opacity:1;transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(.8);}
}

/* Flashes */
#wflash,#mflash{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:0;}
#wflash.show,#mflash.show{animation:ffl .5s ease forwards;}
@keyframes ffl{0%,35%{opacity:1;}100%{opacity:0;}}

/* Particles */
.particle{position:absolute;pointer-events:none;z-index:50;
  font-size:26px;animation:pfly .7s ease-out forwards;}
@keyframes pfly{
  0%{transform:translate(0,0) scale(1);opacity:1;}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}
}
.cring{position:absolute;border-radius:50%;pointer-events:none;z-index:40;animation:sw .6s ease-out forwards;}
@keyframes sw{0%{transform:scale(0);opacity:1;}100%{transform:scale(4);opacity:0;}}

/* ── ZONE 3: TIMER BAR ── */
#zone-timer{
  flex:0 0 24px;
  padding:0 14px;
  display:flex;align-items:center;
  background:rgba(0,0,0,.25);
  flex-shrink:0;
}
#tbar-bg{
  width:100%;height:10px;border-radius:5px;
  background:rgba(255,255,255,.08);overflow:hidden;
}
#tbar-fill{
  height:100%;width:100%;border-radius:5px;
  background:var(--cy);
  transition:background .3s;
}

/* ── ZONE 4: PLAYER AVATAR ROW ── */
#zone-avatars{
  flex:0 0 auto;
  min-height:90px;
  display:flex;
  align-items:center;justify-content:center;
  gap:clamp(10px,3vw,32px);
  padding:8px 16px 12px;
  background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,transparent 100%);
  border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}

/* Individual player card in avatar row */
.pcard{
  display:flex;flex-direction:column;
  align-items:center;gap:4px;
  min-width:clamp(56px,10vw,96px);
  position:relative;
}
.pcard-circle{
  width:clamp(52px,8vw,80px);
  height:clamp(52px,8vw,80px);
  border-radius:50%;
  border:3px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(24px,4vw,40px);
  position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
.pcard.c1 .pcard-circle{border-color:var(--p1);background:var(--p1b);}
.pcard.c2 .pcard-circle{border-color:var(--p2);background:var(--p2b);}
.pcard.c3 .pcard-circle{border-color:var(--p3);background:var(--p3b);}
.pcard.c4 .pcard-circle{border-color:var(--p4);background:var(--p4b);}

/* Status label under each avatar */
.pcard-label{
  font-size:clamp(10px,1.6vw,15px);
  text-align:center;
  padding:2px 8px;
  border-radius:10px;
  background:rgba(0,0,0,.4);
  border:1.5px solid rgba(255,255,255,.1);
  min-width:60px;white-space:nowrap;
  transition:background .2s,border-color .2s,color .2s;
}
.pcard-name{font-size:clamp(9px,1.3vw,13px);color:rgba(255,255,255,.5);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}

/* Status states */
.pcard-circle.st-waiting{}
.pcard-circle.st-right{animation:stRight .5s ease;}
@keyframes stRight{0%{transform:scale(1);}40%{transform:scale(1.5);}100%{transform:scale(1);}}
.pcard-circle.st-wrong{animation:stWrong .35s ease;}
@keyframes stWrong{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.pcard-circle.st-frozen{opacity:.35;filter:grayscale(.9);}
.pcard-circle.st-winner{animation:stWinner .5s ease infinite alternate;}
@keyframes stWinner{from{transform:scale(1) rotate(-5deg);}to{transform:scale(1.12) rotate(5deg);}}

/* Status label colors */
.pcard-label.lb-waiting{color:rgba(255,255,255,.45);}
.pcard-label.lb-right{background:rgba(0,255,135,.2);border-color:var(--g);color:var(--g);}
.pcard-label.lb-wrong{background:rgba(255,68,68,.2);border-color:#ff4444;color:#ff8888;}
.pcard-label.lb-frozen{background:rgba(0,212,255,.15);border-color:var(--cy);color:var(--cy);}
.pcard-label.lb-fast{background:rgba(255,215,0,.2);border-color:var(--y);color:var(--y);}
.pcard-label.lb-dc{color:rgba(255,255,255,.25);font-style:italic;}

/* ── WINNER OVERLAY ── */
#winner-overlay{
  position:absolute;inset:0;z-index:80;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:rgba(0,0,0,.82);backdrop-filter:blur(12px);
}
#winner-overlay.show{display:flex;animation:wovIn .5s ease;}
@keyframes wovIn{from{opacity:0;}to{opacity:1;}}
#wov-av{font-size:clamp(64px,12vw,100px);animation:wovAv 1s ease infinite alternate;}
@keyframes wovAv{from{transform:scale(1) rotate(-5deg);}to{transform:scale(1.1) rotate(5deg);}}
#wov-txt{font-size:clamp(26px,5vw,52px);text-align:center;}
#wov-podium{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.pod-card{border-radius:14px;padding:10px 16px;text-align:center;
  border:2.5px solid rgba(255,255,255,.2);}
.pod-card .pod-medal{font-size:28px;} .pod-card .pod-av{font-size:26px;}
.pod-card .pod-name{font-size:13px;opacity:.8;margin-top:2px;}
.pod-card .pod-score{font-size:22px;margin-top:2px;}
#pa-btn{
  background:linear-gradient(145deg,#00d4ff,#00ff87);
  border:3px solid rgba(255,255,255,.4);border-radius:26px;
  padding:13px 40px;font-size:clamp(18px,3.5vw,30px);
  font-family:'Fredoka One',cursive;color:#003;cursor:pointer;
  box-shadow:0 6px 0 rgba(0,80,80,.8),0 10px 24px rgba(0,212,255,.4);
  touch-action:manipulation;
}
#pa-btn:active{transform:translateY(4px);}

/* ── UTILITY ── */
#dc-pill{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:300;
  background:rgba(233,69,96,.9);border-radius:18px;padding:5px 16px;
  font-size:13px;display:none;white-space:nowrap;
}
#dc-pill.show{display:block;animation:pillIn .3s ease;}
@keyframes pillIn{from{transform:translateX(-50%) translateY(-20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}

.uibtn{position:fixed;z-index:300;background:rgba(255,255,255,.1);
  border:1.5px solid rgba(255,255,255,.18);border-radius:11px;padding:6px 12px;
  font-size:13px;color:rgba(255,255,255,.4);cursor:pointer;
  font-family:'Fredoka One',cursive;touch-action:manipulation;}
#sbtn{bottom:12px;right:12px;} #fbtn{bottom:12px;right:86px;}
</style>
</head>
<body>

<div id="stars"></div>
<button class="uibtn" id="sbtn">🔊</button>
<button class="uibtn" id="fbtn">⛶</button>
<div id="dc-pill"></div>

<!-- ══════════════════════════════════════════
     PAIRING / LOBBY
══════════════════════════════════════════ -->
<div class="screen active" id="s-pair">
  <div class="vrow">🥕🍅🥦🥔🌽🍆</div>
  <h1>Veggie Attack! ⚡ Multiplayer</h1>
  <div class="pair-card">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div id="qrwrap"><div id="qrcode"></div></div>
      <div class="plabel">📱 Scan to join</div>
    </div>
    <div class="pmeta">
      <div class="plabel">Room Code</div>
      <div id="room-code">····</div>
      <div class="pstat-row">
        <div class="pdot w" id="pdot"></div>
        <span id="pstxt">Setting up…</span>
      </div>
    </div>
  </div>
  <div id="lobby-slots"></div>
  <button id="start-btn" onclick="startCountdown()">▶ START!</button>
  <div id="ctrl-url"></div>
</div>

<!-- ══════════════════════════════════════════
     COUNTDOWN
══════════════════════════════════════════ -->
<div class="screen" id="s-cd">
  <div id="cdn">3</div>
  <div id="cdmsg">Get ready…</div>
</div>

<!-- ══════════════════════════════════════════
     GAME SCREEN
══════════════════════════════════════════ -->
<div class="screen" id="s-game">

  <!-- ZONE 1: PLAYER HUD (top strip) -->
  <div id="zone-hud">
    <!-- built dynamically -->
  </div>

  <!-- ZONE 2: ACTION STAGE (center) -->
  <div id="zone-stage">
    <div id="rnd-badge">Round 1</div>
    <div id="spd-badge">⚡</div>

    <!-- Timer ring top-right -->
    <div id="tring">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="26" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="5"/>
        <circle id="tc" cx="30" cy="30" r="26"/>
      </svg>
      <div id="tnum">3</div>
    </div>

    <!-- Veggie flying object -->
    <div id="vobj">🥕</div>

    <!-- Action prompt (large center) -->
    <div id="action-prompt">
      <span id="pe">👊</span>
      <span id="pw">PUNCH!</span>
    </div>

    <!-- Round toast -->
    <div id="rtost"></div>

    <!-- Flash overlays -->
    <div id="wflash"></div>
    <div id="mflash"></div>

    <!-- Winner overlay (covers only stage+avatars) -->
    <div id="winner-overlay">
      <div id="wov-av">🦊</div>
      <div id="wov-txt">🏆 WINNER!</div>
      <div id="wov-podium"></div>
      <button id="pa-btn" onclick="resetToLobby()">🔄 Play Again!</button>
    </div>
  </div>

  <!-- ZONE 3: FULL-WIDTH TIMER BAR -->
  <div id="zone-timer">
    <div id="tbar-bg">
      <div id="tbar-fill"></div>
    </div>
  </div>

  <!-- ZONE 4: PLAYER AVATAR ROW + STATUS LABELS -->
  <div id="zone-avatars">
    <!-- built dynamically — each player gets avatar circle + status label + name -->
  </div>

</div>

<script>
// ════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════
const VEGGIES=[
  {emoji:'🥕',glow:'rgba(255,122,0,.65)'},{emoji:'🍅',glow:'rgba(255,51,51,.65)'},
  {emoji:'🥦',glow:'rgba(0,204,68,.65)'}, {emoji:'🥔',glow:'rgba(204,136,0,.65)'},
  {emoji:'🍆',glow:'rgba(119,34,204,.65)'},{emoji:'🌽',glow:'rgba(255,204,0,.65)'},
];
const ACTIONS=[
  {id:'punch',word:'PUNCH!',emoji:'👊'},{id:'smash',word:'SMASH!',emoji:'💥'},
  {id:'chop', word:'CHOP!', emoji:'🪓'},{id:'stomp',word:'STOMP!',emoji:'👣'},
  {id:'kick', word:'KICK!', emoji:'🦵'},{id:'jump', word:'JUMP!', emoji:'⬆️'},
  {id:'duck', word:'DUCK!', emoji:'⬇️'},{id:'block',word:'BLOCK!',emoji:'🛡️'},
  {id:'pull', word:'PULL!', emoji:'🤏'},{id:'spin', word:'SPIN!', emoji:'🔄'},
  {id:'slap', word:'SLAP!', emoji:'🖐️'},{id:'wave', word:'WAVE!', emoji:'👋'},
];
const PC=['c1','c2','c3','c4'];
const PH=['#ff4444','#4499ff','#ffcc00','#cc44ff'];
const MAX_PLAYERS=4, WIN_SCORE=30, MAX_ROUNDS=15, DW=250;

// ════════════════════════════════════════════════════
// STARS
// ════════════════════════════════════════════════════
(()=>{
  const c=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');s.className='star';
    const z=Math.random()*3+1;
    s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*80}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

// ════════════════════════════════════════════════════
// AUDIO
// ════════════════════════════════════════════════════
let audioCtx=null,soundOn=true;
function gctx(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function tone(t){
  if(!soundOn)return;
  try{
    const ctx=gctx(),n=ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(t==='punch'){o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(80,n+.12);g.gain.setValueAtTime(.55,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.start(n);o.stop(n+.15);}
    else if(t==='success'){
      [523,659,784].forEach((f,i)=>{const oc=ctx.createOscillator(),gc=ctx.createGain();oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;gc.gain.setValueAtTime(0,n+i*.05);gc.gain.linearRampToValueAtTime(.3,n+i*.05+.02);gc.gain.exponentialRampToValueAtTime(.001,n+i*.05+.3);oc.start(n+i*.05);oc.stop(n+i*.05+.3);});
      o.start(n);o.stop(n+.01);
    }
    else if(t==='error'){o.type='square';o.frequency.setValueAtTime(180,n);o.frequency.setValueAtTime(110,n+.1);g.gain.setValueAtTime(.38,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.start(n);o.stop(n+.25);}
    else if(t==='incoming'){o.type='sine';o.frequency.setValueAtTime(200,n);o.frequency.linearRampToValueAtTime(400,n+.3);g.gain.setValueAtTime(.18,n);g.gain.setValueAtTime(.3,n+.15);g.gain.exponentialRampToValueAtTime(.001,n+.35);o.start(n);o.stop(n+.35);}
    else if(t==='connect'){[400,600,800].forEach((f,i)=>{const oc=ctx.createOscillator(),gc=ctx.createGain();oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;gc.gain.setValueAtTime(0,n+i*.07);gc.gain.linearRampToValueAtTime(.22,n+i*.07+.02);gc.gain.exponentialRampToValueAtTime(.001,n+i*.07+.2);oc.start(n+i*.07);oc.stop(n+i*.07+.2);});o.start(n);o.stop(n+.01);}
    else if(t==='cd'){o.type='sine';o.frequency.value=600;g.gain.setValueAtTime(.4,n);g.gain.exponentialRampToValueAtTime(.001,n+.18);o.start(n);o.stop(n+.18);}
    else if(t==='go'){[800,1000,1200].forEach((f,i)=>{const oc=ctx.createOscillator(),gc=ctx.createGain();oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;gc.gain.setValueAtTime(0,n+i*.04);gc.gain.linearRampToValueAtTime(.36,n+i*.04+.02);gc.gain.exponentialRampToValueAtTime(.001,n+i*.04+.25);oc.start(n+i*.04);oc.stop(n+i*.04+.25);});o.start(n);o.stop(n+.01);}
    else if(t==='win'){[523,659,784,1047].forEach((f,i)=>{const oc=ctx.createOscillator(),gc=ctx.createGain();oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;gc.gain.setValueAtTime(0,n+i*.1);gc.gain.linearRampToValueAtTime(.36,n+i*.1+.04);gc.gain.exponentialRampToValueAtTime(.001,n+i*.1+.5);oc.start(n+i*.1);oc.stop(n+i*.1+.5);});o.start(n);o.stop(n+.01);}
    else{o.start(n);o.stop(n+.01);}
  }catch(e){}
}
function speak(text){
  if(!soundOn)return;
  try{const u=new SpeechSynthesisUtterance(text.replace('!',''));u.rate=.85;u.pitch=1.3;u.volume=.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}catch(e){}
}

// ════════════════════════════════════════════════════
// SCREEN SWITCH
// ════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ════════════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════════════
let players=[],roomCode='',peer=null;
let gameRunning=false,roundNum=0,currentAction=null,roundActive=false;
let timerIv=null,spawnTm=null,veggieTm=null,decTm=null;
let speed=1,roundTaps=[];
let tbarRaf=null,tbarStart=0,tbarDur=3500;

// ════════════════════════════════════════════════════
// PEERJS
// ════════════════════════════════════════════════════
function genCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

function initPeer(){
  roomCode=genCode();
  document.getElementById('room-code').textContent=roomCode;
  setPS('w','Setting up…');
  const base=window.location.href.replace(/index\.html.*$/,'').replace(/\/$/,'');
  const url=base+'/controller.html?room='+roomCode;
  document.getElementById('ctrl-url').textContent='📲 '+url;
  try{
    document.getElementById('qrcode').innerHTML='';
    new QRCode(document.getElementById('qrcode'),{text:url,width:116,height:116,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
  }catch(e){}

  peer=new Peer('VEGGIE-'+roomCode,{debug:0,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  peer.on('open',()=>{setPS('w','Waiting for players…');buildLobby();});
  peer.on('connection',c=>{if(players.length>=MAX_PLAYERS){c.close();return;}addPlayer(c);});
  peer.on('error',err=>{if(err.type==='unavailable-id'){setTimeout(initPeer,400);return;}setTimeout(initPeer,3000);});
  peer.on('disconnected',()=>peer.reconnect());
}

function addPlayer(c){
  const idx=players.length;
  const p={conn:c,name:'Player '+(idx+1),avatar:'❓',cc:PC[idx],ch:PH[idx],score:0,frozen:false,frozenUntil:0,dc:false,status:'waiting'};
  players.push(p);
  c.on('open',()=>{
    c.send({type:'assign',cc:p.cc,ch:p.ch,pos:idx+1});
    tone('connect');buildLobby();updateStart();bcastLobby();
  });
  c.on('data',d=>{
    if(d.type==='join'){
      p.name=d.name||p.name;p.avatar=d.avatar||'🎮';
      buildLobby();bcastLobby();showJoinToast(p);
    }
    else if(d.type==='action'&&roundActive&&gameRunning){
      const now=Date.now();
      if(p.frozen&&now<p.frozenUntil)return;
      onTap(p,d.id,now);
    }
  });
  c.on('close',()=>{p.dc=true;buildHUD();buildAvatarRow();buildLobby();updateStart();showDCP(p.name+' disconnected');});
  c.on('error',()=>{p.dc=true;});
}

function bcast(m){players.forEach(p=>{if(!p.dc&&p.conn&&p.conn.open)try{p.conn.send(m);}catch(e){};});}
function send1(p,m){if(!p.dc&&p.conn&&p.conn.open)try{p.conn.send(m);}catch(e){};}
function bcastLobby(){bcast({type:'lobbyState',players:players.map(p=>({name:p.name,avatar:p.avatar,cc:p.cc,dc:p.dc}))});}
function setPS(s,t){
  document.getElementById('pdot').className='pdot '+(s==='ok'?'ok':s==='w'?'w':'');
  document.getElementById('pstxt').textContent=t;
}

// ════════════════════════════════════════════════════
// LOBBY UI
// ════════════════════════════════════════════════════
function buildLobby(){
  const wrap=document.getElementById('lobby-slots');wrap.innerHTML='';
  for(let i=0;i<MAX_PLAYERS;i++){
    const p=players[i],div=document.createElement('div');
    div.className='pslot c'+(i+1)+(p?' filled':'');
    if(p?.dc)div.style.opacity='.35';
    div.innerHTML=p
      ?`<div class="sav">${p.avatar}</div><div class="sname" style="color:${p.ch}">${p.name}</div>`
      :`<div class="sav" style="opacity:.2">👤</div><div class="sempty">Waiting…</div>`;
    wrap.appendChild(div);
  }
  const n=players.filter(p=>!p.dc).length;
  setPS(n>0?'ok':'w',n>0?n+' player'+(n>1?'s':'')+' connected':'Waiting for players…');
}
function updateStart(){
  const b=document.getElementById('start-btn'),n=players.filter(p=>!p.dc).length;
  b.classList.toggle('show',n>=1);
  b.textContent=n===1?'▶ START (Solo)':'▶ START! ('+n+' players)';
}
function showJoinToast(p){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:${p.ch};color:#000;border-radius:18px;padding:7px 18px;font-size:16px;z-index:400;`;
  t.textContent=p.avatar+' '+p.name+' joined!';
  document.body.appendChild(t);setTimeout(()=>t.remove(),2000);
}
function showDCP(m){
  const p=document.getElementById('dc-pill');p.textContent='📱 '+m;
  p.classList.add('show');clearTimeout(p._t);p._t=setTimeout(()=>p.classList.remove('show'),3000);
}

// ════════════════════════════════════════════════════
// COUNTDOWN
// ════════════════════════════════════════════════════
function startCountdown(){
  if(!players.filter(p=>!p.dc).length)return;
  showScreen('s-cd');
  bcast({type:'countdown'});
  let n=3;
  const en=document.getElementById('cdn'),em=document.getElementById('cdmsg');
  en.textContent=n;en.style.color='var(--y)';
  tone('cd');
  const iv=setInterval(()=>{
    n--;
    if(n>0){
      en.textContent=n;en.style.animation='none';void en.offsetWidth;en.style.animation='cdpop .8s ease';
      tone('cd');
    } else {
      clearInterval(iv);
      en.textContent='GO!';en.style.color='var(--g)';
      en.style.animation='none';void en.offsetWidth;en.style.animation='cdpop .5s ease';
      em.textContent='SMASH THE VEGGIES! 🥕⚡';
      tone('go');bcast({type:'go'});
      setTimeout(startGame,650);
    }
  },1000);
}

// ════════════════════════════════════════════════════
// GAME
// ════════════════════════════════════════════════════
function startGame(){
  showScreen('s-game');gameRunning=true;roundNum=0;speed=1;
  players.forEach(p=>{p.score=0;p.frozen=false;p.status='waiting';});
  buildHUD();buildAvatarRow();scheduleNext(500);
}

function resetToLobby(){
  gameRunning=false;roundActive=false;
  clearInterval(timerIv);clearTimeout(spawnTm);clearTimeout(decTm);stopTBar();
  if(tbarRaf){cancelAnimationFrame(tbarRaf);tbarRaf=null;}
  players.forEach(p=>{p.score=0;p.frozen=false;p.status='waiting';p.dc=false;});
  document.getElementById('winner-overlay').classList.remove('show');
  document.getElementById('action-prompt').classList.remove('show');
  document.getElementById('tring').classList.remove('show');
  document.getElementById('vobj').style.opacity='0';
  document.getElementById('tbar-fill').style.width='100%';
  bcast({type:'lobby'});buildLobby();updateStart();showScreen('s-pair');
}

function scheduleNext(d){clearTimeout(spawnTm);spawnTm=setTimeout(spawnRound,d);}

function spawnRound(){
  if(!gameRunning)return;
  roundNum++;roundTaps=[];
  // Reset all statuses to waiting
  players.filter(p=>!p.dc).forEach(p=>{p.status='waiting';});
  updateAvatarStatuses();

  const veg=VEGGIES[Math.floor(Math.random()*VEGGIES.length)];
  currentAction=ACTIONS[Math.floor(Math.random()*ACTIONS.length)];
  document.getElementById('rnd-badge').textContent='Round '+roundNum;
  bcast({type:'round',actionId:currentAction.id,actionWord:currentAction.word,actionEmoji:currentAction.emoji,roundNum});
  showPrompt(currentAction);animateVeggie(veg);startTimer();startTBar(3.5);
  roundActive=true;speak(currentAction.word);tone('incoming');
  if(speed>=3){const s=document.getElementById('spd-badge');s.textContent=speed>=6?'🔥 INSANE!':speed>=4?'⚡ FAST!':'🚀 SPEEDY!';s.classList.add('show');}
}

function showPrompt(a){
  document.getElementById('pe').textContent=a.emoji;
  document.getElementById('pw').textContent=a.word;
  const el=document.getElementById('action-prompt');el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
}

function animateVeggie(v){
  const obj=document.getElementById('vobj');
  const xp=20+Math.random()*60;
  obj.style.cssText=`left:${xp}%;top:10%;opacity:0;transform:translate(-50%,0) scale(.08) rotate(0deg);transition:none;`;
  obj.textContent=v.emoji;
  obj.style.filter=`drop-shadow(0 0 22px ${v.glow})`;
  void obj.offsetWidth;
  const dur=Math.max(900,2600-(speed-1)*200);
  obj.style.transition=`transform ${dur}ms cubic-bezier(.2,0,.8,1),opacity ${dur}ms ease`;
  obj.style.opacity='1';
  obj.style.transform=`translate(-50%,0) scale(3.2) rotate(${(Math.random()-.5)*40}deg)`;
  clearTimeout(veggieTm);
  veggieTm=setTimeout(()=>{obj.style.opacity='0';},dur*.9);
}

function startTimer(){
  clearInterval(timerIv);
  const total=Math.max(1.8,3.5-(speed-1)*.18);let left=total;
  const tc=document.getElementById('tc'),tn=document.getElementById('tnum'),ring=document.getElementById('tring');
  ring.classList.add('show');
  tc.style.strokeDashoffset=0;tc.style.stroke='var(--cy)';tn.textContent=Math.ceil(left);
  const tick=60;let ticks=0;
  timerIv=setInterval(()=>{
    ticks++;left=total-(ticks*tick/1000);const r=Math.max(0,left/total);
    tc.style.strokeDashoffset=163*(1-r);tn.textContent=Math.ceil(Math.max(0,left));
    if(r<.35)tc.style.stroke='#ff2d78';else if(r<.6)tc.style.stroke='#ffd700';else tc.style.stroke='var(--cy)';
    if(left<=0){clearInterval(timerIv);if(roundActive)missRound();}
  },tick);
}

// Wide timer bar (rAF driven)
function startTBar(secs){
  stopTBar();
  const fill=document.getElementById('tbar-fill');
  fill.style.width='100%';fill.style.background='var(--cy)';
  tbarDur=secs*1000;tbarStart=performance.now();
  function tick(now){
    const ratio=Math.max(0,1-(now-tbarStart)/tbarDur);
    fill.style.width=(ratio*100)+'%';
    if(ratio<.35)fill.style.background='#ff2d78';
    else if(ratio<.6)fill.style.background='#ffd700';
    else fill.style.background='var(--cy)';
    if(ratio>0)tbarRaf=requestAnimationFrame(tick);
  }
  tbarRaf=requestAnimationFrame(tick);
}
function stopTBar(){
  if(tbarRaf){cancelAnimationFrame(tbarRaf);tbarRaf=null;}
}

// ════════════════════════════════════════════════════
// TAP HANDLING — BATTLE ROYALE
// ════════════════════════════════════════════════════
function onTap(p,actionId,ts){
  if(!roundActive)return;
  if(actionId!==currentAction.id){
    // Wrong tap — freeze
    p.status='wrong';updatePlayerStatus(p);
    freezePlayer(p,2000);
    send1(p,{type:'feedback',result:'wrong',score:p.score});
    tone('error');
    // Show ❌ label briefly then revert to frozen
    setTimeout(()=>{
      if(p.frozen){p.status='frozen';updatePlayerStatus(p);}
    },600);
    return;
  }
  // Correct — mark immediately
  p.status='right';updatePlayerStatus(p);
  roundTaps.push({p,ts});
  if(roundTaps.length===1){clearTimeout(decTm);decTm=setTimeout(resolveRound,DW);}
}

function resolveRound(){
  if(!roundActive)return;
  roundActive=false;clearInterval(timerIv);clearTimeout(decTm);stopTBar();
  document.getElementById('tring').classList.remove('show');
  if(!roundTaps.length)return;

  roundTaps.sort((a,b)=>a.ts-b.ts);
  const winner=roundTaps[0].p;
  const pts=10+Math.max(0,5-roundTaps.length);
  winner.score+=pts;
  if(roundNum%5===0&&roundNum>0)speed=Math.min(8,speed+1);

  // Mark non-winners as waiting
  players.filter(p=>!p.dc&&p!==winner&&p.status==='right').forEach(p=>{p.status='waiting';});

  updateHUD();

  // Show "FAST!" label for winner briefly
  winner.status='fast';updateAvatarStatuses();
  explodeVeggie(winner.ch);flashWin(winner.ch);
  showToast(`${winner.avatar} ${winner.name} +${pts}! 🎉`,winner.ch);
  tone('success');

  bcast({type:'result',winnerId:winner.conn.peer,winnerName:winner.name,winnerAvatar:winner.avatar,scores:scoreMap()});
  players.filter(p=>!p.dc).forEach(p=>send1(p,{type:'feedback',result:p===winner?'win':'lose',score:p.score,winnerName:winner.name,winnerAvatar:winner.avatar}));

  const done=winner.score>=WIN_SCORE||roundNum>=MAX_ROUNDS;
  setTimeout(()=>{
    document.getElementById('action-prompt').classList.remove('show');
    document.getElementById('vobj').style.opacity='0';
    if(done){endGame();}
    else{
      // Reset statuses
      players.filter(p=>!p.dc).forEach(p=>{if(!p.frozen)p.status='waiting';});
      updateAvatarStatuses();
      scheduleNext(Math.max(600,1200-(speed-1)*80));
    }
  },800);
}

function missRound(){
  roundActive=false;clearTimeout(decTm);stopTBar();
  document.getElementById('tring').classList.remove('show');
  document.getElementById('action-prompt').classList.remove('show');
  document.getElementById('vobj').style.opacity='0';
  const mf=document.getElementById('mflash');mf.style.background='rgba(233,69,96,.3)';mf.className='';void mf.offsetWidth;mf.className='show';
  tone('error');showToast('⏰ Nobody wins!','#ff4444');
  players.filter(p=>!p.dc&&!p.frozen).forEach(p=>{p.status='waiting';});
  updateAvatarStatuses();
  bcast({type:'miss',scores:scoreMap()});
  players.filter(p=>!p.dc).forEach(p=>send1(p,{type:'feedback',result:'miss',score:p.score}));
  setTimeout(()=>scheduleNext(1200),700);
}

function scoreMap(){
  const m={};players.filter(p=>!p.dc).forEach(p=>{m[p.conn.peer]=p.score;});return m;
}

function freezePlayer(p,ms){
  p.frozen=true;p.frozenUntil=Date.now()+ms;
  p.status='frozen';updatePlayerStatus(p);
  send1(p,{type:'freeze',duration:ms});
  // Freeze bar in HUD
  const fb=document.getElementById('fb-'+p.cc);
  if(fb){fb.style.transition='none';fb.style.width='100%';void fb.offsetWidth;fb.style.transition=`width ${ms}ms linear`;fb.style.width='0%';}
  setTimeout(()=>{p.frozen=false;p.status='waiting';updatePlayerStatus(p);send1(p,{type:'unfreeze'});},ms);
}

// ════════════════════════════════════════════════════
// ZONE 1: HUD (top strip — avatar + name + score)
// ════════════════════════════════════════════════════
function buildHUD(){
  const strip=document.getElementById('zone-hud');
  const act=players.filter(p=>!p.dc);
  strip.style.gridTemplateColumns=`repeat(${act.length||1},1fr)`;
  strip.innerHTML='';
  act.forEach(p=>{
    const d=document.createElement('div');
    d.className='phud '+p.cc;d.id='hud-'+p.cc;
    d.innerHTML=`
      <div class="hav">${p.avatar}</div>
      <div class="hinfo">
        <div class="hname">${p.name}</div>
        <div class="hscore">${p.score}<span class="hpts">pts</span></div>
      </div>
      <div class="hrank">#${rank(p)}</div>
      <div class="fbar" id="fb-${p.cc}"></div>
    `;
    strip.appendChild(d);
  });
}

function updateHUD(){
  players.filter(p=>!p.dc).forEach(p=>{
    const e=document.getElementById('hud-'+p.cc);if(!e)return;
    e.querySelector('.hscore').innerHTML=p.score+'<span class="hpts">pts</span>';
    e.querySelector('.hrank').textContent='#'+rank(p);
    // Score pop
    e.classList.remove('score-pop');void e.offsetWidth;e.classList.add('score-pop');
  });
}

function rank(pl){
  return [...players].filter(p=>!p.dc).sort((a,b)=>b.score-a.score).findIndex(p=>p===pl)+1;
}

// ════════════════════════════════════════════════════
// ZONE 4: AVATAR ROW (bottom — avatars + live status)
// ════════════════════════════════════════════════════

// Status text + class map
const STATUS_MAP={
  waiting: {text:'⏳ Ready',    cls:'lb-waiting'},
  right:   {text:'✅ FAST!',    cls:'lb-right'},
  wrong:   {text:'❌ WRONG',    cls:'lb-wrong'},
  frozen:  {text:'❄️ Frozen…', cls:'lb-frozen'},
  fast:    {text:'🌟 WINNER!',  cls:'lb-fast'},
  dc:      {text:'📴 Gone',     cls:'lb-dc'},
};

function buildAvatarRow(){
  const row=document.getElementById('zone-avatars');row.innerHTML='';
  players.filter(p=>!p.dc).forEach(p=>{
    const card=document.createElement('div');
    card.className='pcard '+p.cc;card.id='pcard-'+p.cc;

    const circle=document.createElement('div');
    circle.className='pcard-circle';circle.id='pcircle-'+p.cc;
    circle.textContent=p.avatar;

    const label=document.createElement('div');
    label.className='pcard-label lb-waiting';label.id='plabel-'+p.cc;
    label.textContent='⏳ Ready';

    const name=document.createElement('div');
    name.className='pcard-name';name.style.color=p.ch;name.textContent=p.name;

    card.appendChild(circle);card.appendChild(label);card.appendChild(name);
    row.appendChild(card);
  });
}

function updatePlayerStatus(p){
  const circle=document.getElementById('pcircle-'+p.cc);
  const label=document.getElementById('plabel-'+p.cc);
  if(!circle||!label)return;

  const key=p.dc?'dc':p.status||'waiting';
  const st=STATUS_MAP[key]||STATUS_MAP.waiting;

  // Update circle animation class
  circle.className='pcard-circle';
  if(key==='right')circle.classList.add('st-right');
  else if(key==='wrong')circle.classList.add('st-wrong');
  else if(key==='frozen')circle.classList.add('st-frozen');
  else if(key==='fast')circle.classList.add('st-winner');

  // Update label
  label.className='pcard-label '+st.cls;
  label.textContent=st.text;
}

function updateAvatarStatuses(){
  players.filter(p=>!p.dc).forEach(p=>updatePlayerStatus(p));
}

// ════════════════════════════════════════════════════
// EFFECTS
// ════════════════════════════════════════════════════
function explodeVeggie(ch){
  const obj=document.getElementById('vobj');
  const stage=document.getElementById('zone-stage');
  const sr=stage.getBoundingClientRect(),or=obj.getBoundingClientRect();
  const cx=or.left+or.width/2-sr.left,cy=or.top+or.height/2-sr.top;
  ['✨','⭐','💫','🌟','💥','🎉','⚡','🔥'].forEach((em,i)=>{
    const p=document.createElement('div');p.className='particle';p.textContent=em;
    const a=(i/8)*Math.PI*2,d=65+Math.random()*75;
    p.style.left=cx+'px';p.style.top=cy+'px';
    p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');
    p.style.animationDuration=(.5+Math.random()*.3)+'s';
    stage.appendChild(p);setTimeout(()=>p.remove(),900);
  });
  const sw=document.createElement('div');sw.className='cring';
  sw.style.cssText=`left:${cx}px;top:${cy}px;width:44px;height:44px;margin-left:-22px;margin-top:-22px;border:4px solid ${ch};`;
  stage.appendChild(sw);setTimeout(()=>sw.remove(),700);
  obj.style.opacity='0';
}

function flashWin(ch){
  const wf=document.getElementById('wflash');
  wf.style.background=`radial-gradient(circle,${ch}55 0%,transparent 70%)`;
  wf.className='';void wf.offsetWidth;wf.className='show';
}

function showToast(msg,color){
  const el=document.getElementById('rtost');
  el.textContent=msg;el.style.color=color;el.style.textShadow=`0 0 20px ${color}`;
  el.className='';void el.offsetWidth;el.className='show';
}

// ════════════════════════════════════════════════════
// GAME OVER
// ════════════════════════════════════════════════════
function endGame(){
  gameRunning=false;
  const sorted=[...players].filter(p=>!p.dc).sort((a,b)=>b.score-a.score);
  const w=sorted[0];
  tone('win');

  // Mark winner in avatar row
  if(w){w.status='fast';updatePlayerStatus(w);}

  bcast({type:'gameover',winnerId:w?.conn.peer,winnerName:w?.name,winnerAvatar:w?.avatar,scores:scoreMap()});

  document.getElementById('wov-av').textContent=w?.avatar||'🏆';
  document.getElementById('wov-txt').innerHTML=`<span style="color:${w?.ch||'#ffd700'}">${w?.avatar} ${w?.name}</span><br>🏆 WINS!`;

  const pod=document.getElementById('wov-podium');pod.innerHTML='';
  sorted.forEach((p,i)=>{
    const c=document.createElement('div');c.className='pod-card';
    c.style.borderColor=p.ch;c.style.background=p.ch+'22';
    c.innerHTML=`<div class="pod-medal">${['🥇','🥈','🥉','🎖️'][i]}</div><div class="pod-av">${p.avatar}</div><div class="pod-name" style="color:${p.ch}">${p.name}</div><div class="pod-score">${p.score}pts</div>`;
    pod.appendChild(c);
  });

  document.getElementById('winner-overlay').classList.add('show');
  document.getElementById('action-prompt').classList.remove('show');
  document.getElementById('tring').classList.remove('show');
}

// ════════════════════════════════════════════════════
// UI CONTROLS
// ════════════════════════════════════════════════════
document.getElementById('sbtn').addEventListener('click',()=>{
  soundOn=!soundOn;
  document.getElementById('sbtn').textContent=soundOn?'🔊':'🔇';
  if(soundOn)tone('incoming');
});
document.getElementById('fbtn').addEventListener('click',()=>{
  const el=document.documentElement;
  if(!document.fullscreenElement)(el.requestFullscreen||el.webkitRequestFullscreen).call(el);
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document);
});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.body.addEventListener('click',()=>{try{gctx();}catch(e){}},{once:true});
document.body.addEventListener('touchstart',()=>{try{gctx();}catch(e){}},{once:true});
window.addEventListener('load',initPeer);
</script>
