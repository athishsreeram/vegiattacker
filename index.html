<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Veggie Attack! 🥕⚡ Multiplayer</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;}
:root{
  --y:#ffd700;--g:#00ff87;--pk:#ff2d78;--cy:#00d4ff;--pu:#a855f7;
  --p1:#ff4444;--p2:#4488ff;--p3:#ffcc00;--p4:#cc44ff;
  --p1d:#aa1111;--p2d:#1144aa;--p3d:#aa8800;--p4d:#8800aa;
}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;
  background:radial-gradient(ellipse at 30% 20%,#1a1a4e 0%,#0d0d1a 100%);
  font-family:'Fredoka One',cursive;color:#fff;}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;background:white;opacity:0;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:1;transform:scale(1);}}
.screen{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.screen.active{display:flex;}

/* PAIRING */
#s-pair{background:radial-gradient(ellipse at 40% 30%,#1a1a5e 0%,#0d0d1a 100%);}
#s-pair h1{font-size:clamp(30px,5vw,64px);color:var(–y);text-shadow:0 0 40px rgba(255,215,0,.7),0 5px 0 rgba(100,60,0,.8);margin:0 0 4px;text-align:center;animation:tFloat 2s ease infinite alternate;}
@keyframes tFloat{from{transform:translateY(0);}to{transform:translateY(-8px);}}
.veggie-row{font-size:clamp(26px,4vw,48px);animation:vParade 1.5s ease infinite alternate;margin-bottom:8px;}
@keyframes vParade{from{transform:rotate(-3deg);}to{transform:rotate(3deg) translateY(-5px);}}
.pair-card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);border-radius:22px;padding:18px 24px;display:flex;gap:24px;align-items:center;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.4);flex-wrap:wrap;justify-content:center;max-width:640px;width:100%;margin-bottom:10px;}
#qrwrap{background:white;border-radius:12px;padding:8px;width:136px;height:136px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(255,215,0,.3);}
.pair-meta{display:flex;flex-direction:column;align-items:center;gap:8px;}
#room-code{font-size:clamp(40px,6.5vw,72px);color:var(–y);letter-spacing:8px;text-shadow:0 0 30px rgba(255,215,0,.8),0 4px 0 rgba(100,60,0,.9);background:rgba(0,0,0,.3);border:3px solid rgba(255,215,0,.4);border-radius:14px;padding:4px 18px;animation:cPulse 2s ease infinite alternate;}
@keyframes cPulse{from{box-shadow:0 0 16px rgba(255,215,0,.2);}to{box-shadow:0 0 36px rgba(255,215,0,.6);}}
.pair-label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.5px;}
.pdot{width:9px;height:9px;border-radius:50%;background:#ff4444;box-shadow:0 0 7px #ff4444;transition:.4s;}
.pdot.wait{background:var(–y);box-shadow:0 0 7px var(–y);animation:dBlink .7s ease infinite alternate;}
.pdot.ok{background:var(–g);box-shadow:0 0 7px var(–g);animation:none;}
@keyframes dBlink{from{opacity:1;}to{opacity:.3;}}
.peer-status{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,.6);background:rgba(0,0,0,.3);border-radius:18px;padding:5px 13px;}
#lobby-slots{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;}
.pslot{width:clamp(72px,11vw,100px);background:rgba(255,255,255,.05);border:2px dashed rgba(255,255,255,.2);border-radius:14px;padding:8px 4px;text-align:center;transition:.4s;}
.pslot.filled{background:rgba(255,255,255,.1);border-style:solid;}
.pslot .sav{font-size:clamp(22px,3.2vw,32px);}
.pslot .sname{font-size:clamp(9px,1.6vw,12px);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pslot .sempty{font-size:11px;color:rgba(255,255,255,.25);margin-top:4px;}
.pslot.c1{border-color:var(–p1);} .pslot.c2{border-color:var(–p2);} .pslot.c3{border-color:var(–p3);} .pslot.c4{border-color:var(–p4);}
#start-btn{background:linear-gradient(145deg,#ff2d78,#a855f7);border:3px solid rgba(255,255,255,.35);border-radius:22px;padding:12px 36px;font-size:clamp(18px,3vw,30px);font-family:‘Fredoka One’,cursive;color:#fff;cursor:pointer;box-shadow:0 7px 0 rgba(100,0,60,.8),0 10px 28px rgba(255,45,120,.4);transition:transform .08s,box-shadow .08s;display:none;}
#start-btn:active{transform:translateY(4px);box-shadow:0 3px 0 rgba(100,0,60,.8);}
#start-btn.show{display:block;}
#ctrl-url{font-size:clamp(9px,1.5vw,12px);color:rgba(255,255,255,.28);text-align:center;word-break:break-all;max-width:480px;margin-top:4px;}

/* COUNTDOWN */
#s-countdown{background:rgba(0,0,0,.92);}
#cd-num{font-size:clamp(80px,18vw,180px);color:var(–y);text-shadow:0 0 60px rgba(255,215,0,.8),0 8px 0 rgba(100,60,0,.9);animation:cdPop .8s ease;}
@keyframes cdPop{0%{transform:scale(2);opacity:0;}60%{transform:scale(.9);}100%{transform:scale(1);opacity:1;}}
#cd-msg{font-size:clamp(18px,3.5vw,36px);color:rgba(255,255,255,.7);margin-top:6px;}

/* GAME */
#s-game{display:none;flex-direction:column;padding:0;}
#s-game.active{display:flex;}
#hud-strip{position:relative;z-index:20;height:clamp(60px,9.5vh,84px);display:grid;gap:6px;padding:5px 8px;flex-shrink:0;background:linear-gradient(180deg,rgba(0,0,0,.6) 0%,transparent 100%);}
.phud{border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 6px;border:2.5px solid rgba(255,255,255,.2);position:relative;overflow:hidden;}
.phud::before{content:’’;position:absolute;inset:0;opacity:.2;}
.phud.c1{border-color:var(–p1);color:var(–p1);}.phud.c1::before{background:var(–p1);}
.phud.c2{border-color:var(–p2);color:var(–p2);}.phud.c2::before{background:var(–p2);}
.phud.c3{border-color:var(–p3);color:var(–p3);}.phud.c3::before{background:var(–p3);}
.phud.c4{border-color:var(–p4);color:var(–p4);}.phud.c4::before{background:var(–p4);}
.phud .hav{font-size:clamp(14px,2.2vw,22px);line-height:1;}
.phud .hn{font-size:clamp(8px,1.3vw,13px);opacity:.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.phud .hs{font-size:clamp(14px,2.5vw,26px);line-height:1.1;}
.phud .hr{position:absolute;top:2px;right:5px;font-size:clamp(8px,1.1vw,11px);opacity:.65;}
.phud .fbar{position:absolute;bottom:0;left:0;height:3px;background:var(–cy);width:0%;transition:width .05s linear;}
#stage{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#rnd-badge{position:absolute;top:8px;left:10px;z-index:20;background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.12);border-radius:9px;padding:2px 9px;font-size:12px;color:rgba(255,255,255,.45);}
#spd-badge{position:absolute;top:8px;left:10px;z-index:21;background:rgba(0,0,0,.5);border:2px solid var(–cy);border-radius:9px;padding:2px 10px;font-size:13px;color:var(–cy);display:none;}
#spd-badge.show{display:block;}
#action-prompt{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:20;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s;}
#action-prompt.show{opacity:1;}
#pe{font-size:clamp(42px,8vw,86px);display:block;line-height:1.1;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5));animation:efloat .8s ease infinite alternate;}
@keyframes efloat{from{transform:translateY(0);}to{transform:translateY(-8px);}}
#pw{display:block;font-size:clamp(36px,6.5vw,80px);color:var(–y);text-shadow:0 0 30px rgba(255,215,0,.8),0 5px 0 rgba(100,60,0,.9);animation:wpulse .5s ease infinite alternate;letter-spacing:3px;}
@keyframes wpulse{from{transform:scale(1);}to{transform:scale(1.06);}}
#tring{position:absolute;top:8px;right:10px;z-index:20;width:62px;height:62px;display:none;}
#tring.show{display:block;}
#tring svg{transform:rotate(-90deg);}
#tc{fill:none;stroke:var(–cy);stroke-width:5;stroke-dasharray:170;stroke-dashoffset:0;stroke-linecap:round;transition:stroke-dashoffset .08s linear;}
#tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:white;}
#vobj{position:absolute;font-size:52px;transform:scale(.1);opacity:0;pointer-events:none;z-index:15;will-change:transform,opacity;animation:vwobble .4s ease infinite alternate;}
@keyframes vwobble{from{filter:drop-shadow(0 8px 24px rgba(0,0,0,.6)) rotate(-6deg);}to{filter:drop-shadow(0 8px 24px rgba(0,0,0,.6)) rotate(6deg);}}
#pstrow{position:absolute;bottom:52px;left:0;right:0;display:flex;justify-content:center;gap:clamp(8px,2vw,18px);z-index:20;}
.pst{width:clamp(42px,6.5vw,62px);height:clamp(42px,6.5vw,62px);border-radius:50%;border:3px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:clamp(16px,2.8vw,26px);transition:.3s;position:relative;overflow:hidden;}
.pst.c1{border-color:var(–p1);background:rgba(255,68,68,.15);}
.pst.c2{border-color:var(–p2);background:rgba(68,136,255,.15);}
.pst.c3{border-color:var(–p3);background:rgba(255,204,0,.15);}
.pst.c4{border-color:var(–p4);background:rgba(204,68,255,.15);}
.pst.tr{animation:tr .4s ease;}
.pst.tw{animation:tw .3s ease;}
.pst.frz{opacity:.35;filter:grayscale(.9);}
@keyframes tr{0%{transform:scale(1);}40%{transform:scale(1.45);}100%{transform:scale(1);}}
@keyframes tw{0%,100%{transform:translateX(0);}30%{transform:translateX(-7px);}70%{transform:translateX(7px);}}
#ground{position:absolute;bottom:0;left:0;right:0;height:42px;background:linear-gradient(180deg,#1a4a2e 0%,#0d2a1a 100%);border-top:3px solid #00ff87;box-shadow:0 -8px 28px rgba(0,255,135,.22);z-index:1;}
.particle{position:absolute;pointer-events:none;z-index:50;font-size:26px;animation:pfly .7s ease-out forwards;}
@keyframes pfly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(–dx),var(–dy)) scale(0);opacity:0;}}
.cring{position:absolute;border-radius:50%;pointer-events:none;z-index:40;animation:sw .6s ease-out forwards;}
@keyframes sw{0%{transform:scale(0);opacity:1;}100%{transform:scale(4);opacity:0;}}
#wflash,#mflash{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:0;}
#wflash.show,#mflash.show{animation:fflash .5s ease forwards;}
@keyframes fflash{0%,30%{opacity:1;}100%{opacity:0;}}
#rtost{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:65;pointer-events:none;opacity:0;text-align:center;font-size:clamp(24px,4.5vw,48px);}
#rtost.show{animation:tost .9s ease forwards;}
@keyframes tost{0%{opacity:0;transform:translate(-50%,-50%) scale(.4);}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}70%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(.8);}}
#winner-banner{position:absolute;inset:0;z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);}
#winner-banner.show{display:flex;animation:wbIn .5s ease;}
@keyframes wbIn{from{opacity:0;}to{opacity:1;}}
#wav{font-size:clamp(56px,10vw,96px);animation:wavAnim 1s ease infinite alternate;}
@keyframes wavAnim{from{transform:scale(1) rotate(-5deg);}to{transform:scale(1.1) rotate(5deg);}}
#wtxt{font-size:clamp(24px,4.5vw,52px);text-align:center;margin-top:8px;}
#wscores{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:12px;}
.wcard{border-radius:12px;padding:8px 14px;text-align:center;border:2.5px solid rgba(255,255,255,.3);}
.wcard .wav2{font-size:26px;} .wcard .wn{font-size:12px;opacity:.8;} .wcard .ws{font-size:20px;}
#pa-btn{background:linear-gradient(145deg,#00d4ff,#00ff87);border:3px solid rgba(255,255,255,.4);border-radius:24px;padding:12px 36px;font-size:clamp(16px,3vw,28px);font-family:‘Fredoka One’,cursive;color:#003;cursor:pointer;box-shadow:0 6px 0 rgba(0,80,80,.8),0 10px 24px rgba(0,212,255,.4);margin-top:14px;touch-action:manipulation;}
#pa-btn:active{transform:translateY(4px);}
#dc-pill{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:300;background:rgba(233,69,96,.9);border-radius:18px;padding:5px 14px;font-size:13px;display:none;}
#dc-pill.show{display:block;animation:pIn .3s ease;}
@keyframes pIn{from{transform:translateX(-50%) translateY(-20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
.uibtn{position:fixed;z-index:300;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:11px;padding:6px 12px;font-size:13px;color:rgba(255,255,255,.45);cursor:pointer;font-family:‘Fredoka One’,cursive;touch-action:manipulation;}
#sbtn{bottom:11px;right:11px;} #fbtn{bottom:11px;right:84px;}
</style>

</head>
<body>
<div id="stars"></div>
<button class="uibtn" id="sbtn">🔊</button>
<button class="uibtn" id="fbtn">⛶</button>
<div id="dc-pill"></div>

<!-- PAIRING/LOBBY -->

<div class="screen active" id="s-pair">
  <div class="veggie-row">🥕🍅🥦🥔🌽🍆</div>
  <h1>Veggie Attack! ⚡ Multiplayer</h1>
  <div class="pair-card">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div id="qrwrap"><div id="qrcode"></div></div>
      <div class="pair-label">📱 Scan to join</div>
    </div>
    <div class="pair-meta">
      <div class="pair-label">Room Code</div>
      <div id="room-code">····</div>
      <div class="peer-status"><div class="pdot wait" id="pdot"></div><span id="pstxt">Setting up…</span></div>
    </div>
  </div>
  <div id="lobby-slots"></div>
  <button id="start-btn" onclick="startCountdown()">▶ START!</button>
  <div id="ctrl-url"></div>
</div>

<!-- COUNTDOWN -->

<div class="screen" id="s-countdown">
  <div id="cd-num">3</div>
  <div id="cd-msg">Get ready…</div>
</div>

<!-- GAME -->

<div class="screen" id="s-game">
  <div id="hud-strip"></div>
  <div id="stage">
    <div id="rnd-badge">Round 1</div>
    <div id="spd-badge">⚡</div>
    <div id="action-prompt"><span id="pe">👊</span><span id="pw">PUNCH!</span></div>
    <div id="tring">
      <svg width="62" height="62" viewBox="0 0 62 62">
        <circle cx="31" cy="31" r="27" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="5"/>
        <circle id="tc" cx="31" cy="31" r="27"/>
      </svg>
      <div id="tnum">3</div>
    </div>
    <div id="vobj">🥕</div>
    <div id="pstrow"></div>
    <div id="wflash"></div>
    <div id="mflash"></div>
    <div id="rtost"></div>
    <div id="winner-banner">
      <div id="wav">🦊</div>
      <div id="wtxt">🏆 WINNER!</div>
      <div id="wscores"></div>
      <button id="pa-btn" onclick="resetToLobby()">🔄 Play Again!</button>
    </div>
    <div id="ground"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const VEGGIES=[
  {emoji:'🥕',glow:'rgba(255,122,0,.6)'},{emoji:'🍅',glow:'rgba(255,51,51,.6)'},
  {emoji:'🥦',glow:'rgba(0,204,68,.6)'},{emoji:'🥔',glow:'rgba(204,136,0,.6)'},
  {emoji:'🍆',glow:'rgba(119,34,204,.6)'},{emoji:'🌽',glow:'rgba(255,204,0,.6)'},
];
const ACTIONS=[
  {id:'punch',word:'PUNCH!',emoji:'👊'},{id:'smash',word:'SMASH!',emoji:'💥'},
  {id:'chop', word:'CHOP!', emoji:'🪓'},{id:'stomp',word:'STOMP!',emoji:'👣'},
  {id:'kick', word:'KICK!', emoji:'🦵'},{id:'jump', word:'JUMP!', emoji:'⬆️'},
  {id:'duck', word:'DUCK!', emoji:'⬇️'},{id:'block',word:'BLOCK!',emoji:'🛡️'},
  {id:'pull', word:'PULL!', emoji:'🤏'},{id:'spin', word:'SPIN!', emoji:'🔄'},
  {id:'slap', word:'SLAP!', emoji:'🖐️'},{id:'wave', word:'WAVE!', emoji:'👋'},
];
const PC=['c1','c2','c3','c4'];
const PH=['#ff4444','#4488ff','#ffcc00','#cc44ff'];
const MAX_PLAYERS=4,WIN_SCORE=30,MAX_ROUNDS=15,DW=250;

// ── STARS ────────────────────────────────────────────────────
(()=>{const c=document.getElementById('stars');for(let i=0;i<70;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*3+1;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*70}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;c.appendChild(s);}})();

// ── AUDIO ──────────────────────────────────────────────────
let audioCtx=null,soundOn=true;
function gctx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function tone(t){
  if(!soundOn)return;
  try{
    const ctx=gctx(),n=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(t==='punch'){o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(80,n+.12);g.gain.setValueAtTime(.55,n);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.start(n);o.stop(n+.15);}
    else if(t==='success'){[523,659,784].forEach((f,i)=>{const oc=ctx.createOscillator(),gc=ctx.createGain();oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;gc.gain.setValueAtTime(0,n+i*.05);gc.gain.linearRampToValueAtTime(.3,n+i*.05+.02);gc.gain.exponentialRampToValueAtTime(.001,n+i*.05+.3);oc.start(n+i*.05);oc.stop(n+i*.05+.3);});o.start(n);o.stop(n+.01);}
    else if(t==='error'){o.type='square';o.frequency.setValueAtTime(180,n);o.frequency.setValueAtTime(110,n+.1);g.gain.setValueAtTime(.4,n);g.gain.exponentialRampToValueAtTime(.001,n+.25);o.start(n);o.stop(n+.25);}
    else if(t==='incoming'){o.type='sine';o.frequency.setValueAtTime(200,n);o.frequency.linearRampToValueAtTime(400,n+.3);g.gain.setValueAtTime(.2,n);g.gain.setValueAtTime(.3,n+.15);g.gain.exponentialRampToValueAtTime(.001,n+.35);o.start(n);o.stop(n+.35);}
    else if(t==='connect'){[400,600,800].forEach((f,i)=>{const oc=ctx.createOscillator(),gc=ctx.createGain();oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;gc.gain.setValueAtTime(0,n+i*.07);gc.gain.linearRampToValueAtTime(.25,n+i*.07+.02);gc.gain.exponentialRampToValueAtTime(.001,n+i*.07+.2);oc.start(n+i*.07);oc.stop(n+i*.07+.2);});o.start(n);o.stop(n+.01);}
    else if(t==='cd'){o.type='sine';o.frequency.value=600;g.gain.setValueAtTime(.45,n);g.gain.exponentialRampToValueAtTime(.001,n+.18);o.start(n);o.stop(n+.18);}
    else if(t==='go'){[800,1000,1200].forEach((f,i)=>{const oc=ctx.createOscillator(),gc=ctx.createGain();oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;gc.gain.setValueAtTime(0,n+i*.04);gc.gain.linearRampToValueAtTime(.38,n+i*.04+.02);gc.gain.exponentialRampToValueAtTime(.001,n+i*.04+.25);oc.start(n+i*.04);oc.stop(n+i*.04+.25);});o.start(n);o.stop(n+.01);}
    else if(t==='win'){[523,659,784,1047].forEach((f,i)=>{const oc=ctx.createOscillator(),gc=ctx.createGain();oc.connect(gc);gc.connect(ctx.destination);oc.type='sine';oc.frequency.value=f;gc.gain.setValueAtTime(0,n+i*.1);gc.gain.linearRampToValueAtTime(.38,n+i*.1+.04);gc.gain.exponentialRampToValueAtTime(.001,n+i*.1+.5);oc.start(n+i*.1);oc.stop(n+i*.1+.5);});o.start(n);o.stop(n+.01);}
    else{o.start(n);o.stop(n+.01);}
  }catch(e){}
}
function speak(t){if(!soundOn)return;try{const u=new SpeechSynthesisUtterance(t.replace('!',''));u.rate=.85;u.pitch=1.3;u.volume=.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(u);}catch(e){}}

// ── SCREEN ────────────────────────────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ── STATE ─────────────────────────────────────────────────
let players=[],roomCode='',peer=null;
let gameRunning=false,roundNum=0,currentAction=null,roundActive=false;
let timerIv=null,spawnTm=null,veggieTm=null,decTm=null;
let speed=1,roundTaps=[];

// ── PEERJS ────────────────────────────────────────────────
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');}

function initPeer(){
  roomCode=genCode();
  document.getElementById('room-code').textContent=roomCode;
  setPS('wait','Setting up…');
  const base=window.location.href.replace(/index\.html.*$/,'').replace(/\/$/,'');
  const url=base+'/controller.html?room='+roomCode;
  document.getElementById('ctrl-url').textContent='📲 '+url;
  try{document.getElementById('qrcode').innerHTML='';new QRCode(document.getElementById('qrcode'),{text:url,width:120,height:120,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
  peer=new Peer('VEGGIE-'+roomCode,{debug:0,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  peer.on('open',()=>{ setPS('wait','Waiting for players…'); buildLobby(); });
  peer.on('connection',c=>{ if(players.length>=MAX_PLAYERS){c.close();return;} addPlayer(c); });
  peer.on('error',err=>{ if(err.type==='unavailable-id'){setTimeout(initPeer,400);return;} setTimeout(initPeer,3000); });
  peer.on('disconnected',()=>peer.reconnect());
}

function addPlayer(c){
  const idx=players.length;
  const p={conn:c,name:'Player '+(idx+1),avatar:'❓',cc:PC[idx],ch:PH[idx],score:0,frozen:false,frozenUntil:0,dc:false};
  players.push(p);
  c.on('open',()=>{ c.send({type:'assign',cc:p.cc,ch:p.ch,pos:idx+1}); tone('connect'); buildLobby(); updateStart(); bcastLobby(); });
  c.on('data',d=>{
    if(d.type==='join'){p.name=d.name||p.name;p.avatar=d.avatar||'🎮';buildLobby();bcastLobby();showJoinToast(p);}
    else if(d.type==='action'&&roundActive&&gameRunning){
      const now=Date.now();
      if(p.frozen&&now<p.frozenUntil)return;
      onTap(p,d.id,now);
    }
  });
  c.on('close',()=>{ p.dc=true; buildHUD(); buildPSRow(); buildLobby(); updateStart(); showDCP(p.name+' disconnected'); });
  c.on('error',()=>{ p.dc=true; });
}

function bcast(m){players.forEach(p=>{if(!p.dc&&p.conn&&p.conn.open)try{p.conn.send(m);}catch(e){};});}
function send1(p,m){if(!p.dc&&p.conn&&p.conn.open)try{p.conn.send(m);}catch(e){};}
function bcastLobby(){bcast({type:'lobbyState',players:players.map(p=>({name:p.name,avatar:p.avatar,cc:p.cc,dc:p.dc}))});}
function setPS(s,t){document.getElementById('pdot').className='pdot '+(s==='ok'?'ok':s==='wait'?'wait':'');document.getElementById('pstxt').textContent=t;}

// ── LOBBY UI ─────────────────────────────────────────────
function buildLobby(){
  const w=document.getElementById('lobby-slots');w.innerHTML='';
  for(let i=0;i<MAX_PLAYERS;i++){
    const p=players[i],div=document.createElement('div');
    div.className='pslot c'+(i+1)+(p?' filled':'');
    div.innerHTML=p?`<div class="sav">${p.avatar}</div><div class="sname" style="color:${p.ch}">${p.name}</div>`:`<div class="sav" style="opacity:.25">👤</div><div class="sempty">Waiting…</div>`;
    if(p?.dc)div.style.opacity='.4';
    w.appendChild(div);
  }
  const act=players.filter(p=>!p.dc).length;
  setPS(act>0?'ok':'wait',act>0?act+' player'+(act>1?'s':'')+' connected':'Waiting for players…');
}
function updateStart(){
  const b=document.getElementById('start-btn'),n=players.filter(p=>!p.dc).length;
  b.style.display=n>=1?'block':'none';
  b.classList.toggle('show',n>=1);
  b.textContent=n===1?'▶ START (Solo)':'▶ START! ('+n+' players)';
}
function showJoinToast(p){const t=document.createElement('div');t.style.cssText=`position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:${p.ch};color:#000;border-radius:18px;padding:7px 18px;font-size:15px;z-index:400;animation:pIn .3s ease;`;t.textContent=p.avatar+' '+p.name+' joined!';document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}
function showDCP(m){const p=document.getElementById('dc-pill');p.textContent='📱 '+m;p.classList.add('show');clearTimeout(p._t);p._t=setTimeout(()=>p.classList.remove('show'),3000);}

// ── COUNTDOWN ───────────────────────────────────────────
function startCountdown(){
  if(!players.filter(p=>!p.dc).length)return;
  showScreen('s-countdown');
  bcast({type:'countdown'});
  let n=3;
  const en=document.getElementById('cd-num'),em=document.getElementById('cd-msg');
  en.textContent=n;en.style.color='var(--y)';
  tone('cd');
  const iv=setInterval(()=>{
    n--;
    if(n>0){en.textContent=n;en.style.animation='none';void en.offsetWidth;en.style.animation='cdPop .8s ease';tone('cd');}
    else{
      clearInterval(iv);
      en.textContent='GO!';en.style.color='var(--g)';en.style.animation='none';void en.offsetWidth;en.style.animation='cdPop .5s ease';
      em.textContent='SMASH THE VEGGIES! 🥕⚡';
      tone('go');bcast({type:'go'});
      setTimeout(startGame,650);
    }
  },1000);
}

// ── GAME ────────────────────────────────────────────────
function startGame(){
  showScreen('s-game');gameRunning=true;roundNum=0;speed=1;
  players.forEach(p=>{p.score=0;p.frozen=false;});
  buildHUD();buildPSRow();scheduleNext(500);
}

function resetToLobby(){
  gameRunning=false;roundActive=false;
  clearInterval(timerIv);clearTimeout(spawnTm);clearTimeout(decTm);
  players.forEach(p=>{p.score=0;p.frozen=false;p.dc=false;});
  document.getElementById('winner-banner').classList.remove('show');
  document.getElementById('action-prompt').classList.remove('show');
  document.getElementById('tring').classList.remove('show');
  document.getElementById('vobj').style.opacity='0';
  bcast({type:'lobby'});buildLobby();updateStart();showScreen('s-pair');
}

function scheduleNext(d){clearTimeout(spawnTm);spawnTm=setTimeout(spawnRound,d);}

function spawnRound(){
  if(!gameRunning)return;
  roundNum++;roundTaps=[];
  const veg=VEGGIES[Math.floor(Math.random()*VEGGIES.length)];
  currentAction=ACTIONS[Math.floor(Math.random()*ACTIONS.length)];
  document.getElementById('rnd-badge').textContent='Round '+roundNum;
  bcast({type:'round',actionId:currentAction.id,actionWord:currentAction.word,actionEmoji:currentAction.emoji,roundNum});
  showPrompt(currentAction);animateVeggie(veg);startTimer();
  roundActive=true;speak(currentAction.word);tone('incoming');
  if(speed>=3){const s=document.getElementById('spd-badge');s.textContent=speed>=6?'🔥 INSANE!':speed>=4?'⚡ FAST!':'🚀 SPEEDY!';s.classList.add('show');}
}

function showPrompt(a){
  document.getElementById('pe').textContent=a.emoji;
  document.getElementById('pw').textContent=a.word;
  const el=document.getElementById('action-prompt');el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
}

function animateVeggie(v){
  const obj=document.getElementById('vobj');
  const xp=15+Math.random()*70;
  obj.style.cssText=`left:${xp}%;top:8%;opacity:0;transform:translate(-50%,0) scale(.1) rotate(0deg);transition:none;`;
  obj.textContent=v.emoji;obj.style.filter=`drop-shadow(0 0 22px ${v.glow})`;
  void obj.offsetWidth;
  const dur=Math.max(900,2600-(speed-1)*200);
  obj.style.transition=`transform ${dur}ms cubic-bezier(.2,0,.8,1),opacity ${dur}ms ease`;
  obj.style.opacity='1';obj.style.transform=`translate(-50%,0) scale(3) rotate(${(Math.random()-.5)*40}deg)`;
  clearTimeout(veggieTm);veggieTm=setTimeout(()=>{obj.style.opacity='0';},dur*.9);
}

function startTimer(){
  clearInterval(timerIv);
  const total=Math.max(1.8,3.5-(speed-1)*.18);let left=total;
  const tc=document.getElementById('tc'),tn=document.getElementById('tnum'),ring=document.getElementById('tring');
  ring.classList.add('show');tc.style.strokeDashoffset=0;tc.style.stroke='var(--cy)';tn.textContent=Math.ceil(left);
  const tick=60;let ticks=0;
  timerIv=setInterval(()=>{
    ticks++;left=total-(ticks*tick/1000);const r=Math.max(0,left/total);
    tc.style.strokeDashoffset=170*(1-r);tn.textContent=Math.ceil(Math.max(0,left));
    if(r<.35)tc.style.stroke='#ff2d78';else if(r<.6)tc.style.stroke='#ffd700';else tc.style.stroke='var(--cy)';
    if(left<=0){clearInterval(timerIv);if(roundActive)missRound();}
  },tick);
}

// ── TAP HANDLING ─────────────────────────────────────────
function onTap(p,actionId,ts){
  if(!roundActive)return;
  if(actionId!==currentAction.id){freezePlayer(p,2000);setPSt(p,'tw');send1(p,{type:'feedback',result:'wrong',score:p.score});tone('error');return;}
  roundTaps.push({p,ts});
  if(roundTaps.length===1){clearTimeout(decTm);decTm=setTimeout(resolveRound,DW);}
  setPSt(p,'tr');
}

function resolveRound(){
  if(!roundActive)return;
  roundActive=false;clearInterval(timerIv);clearTimeout(decTm);
  document.getElementById('tring').classList.remove('show');
  if(!roundTaps.length)return;
  roundTaps.sort((a,b)=>a.ts-b.ts);
  const winner=roundTaps[0].p;
  const pts=10+Math.max(0,5-roundTaps.length);
  winner.score+=pts;
  if(roundNum%5===0&&roundNum>0)speed=Math.min(8,speed+1);
  updateHUD();explodeVeggie(winner.ch);flashWin(winner.ch);
  showToast(`${winner.avatar} ${winner.name} +${pts}! 🎉`,winner.ch);
  tone('success');
  bcast({type:'result',winnerId:winner.conn.peer,winnerName:winner.name,scores:scoreMap()});
  players.filter(p=>!p.dc).forEach(p=>send1(p,{type:'feedback',result:p===winner?'win':'lose',score:p.score,winnerName:winner.name,winnerAvatar:winner.avatar}));
  const done=winner.score>=WIN_SCORE||roundNum>=MAX_ROUNDS;
  setTimeout(()=>{
    document.getElementById('action-prompt').classList.remove('show');
    document.getElementById('vobj').style.opacity='0';
    if(done)endGame();else scheduleNext(Math.max(600,1200-(speed-1)*80));
  },700);
}

function missRound(){
  roundActive=false;clearTimeout(decTm);
  document.getElementById('tring').classList.remove('show');
  document.getElementById('action-prompt').classList.remove('show');
  document.getElementById('vobj').style.opacity='0';
  const m=document.getElementById('mflash');m.style.background='rgba(233,69,96,.3)';m.className='';void m.offsetWidth;m.className='show';
  tone('error');showToast('⏰ Nobody wins this round!','#ff4444');
  bcast({type:'miss',scores:scoreMap()});
  players.filter(p=>!p.dc).forEach(p=>send1(p,{type:'feedback',result:'miss',score:p.score}));
  setTimeout(()=>scheduleNext(1200),700);
}

function scoreMap(){const m={};players.filter(p=>!p.dc).forEach(p=>{m[p.conn.peer]=p.score;});return m;}

function freezePlayer(p,ms){
  p.frozen=true;p.frozenUntil=Date.now()+ms;setPSt(p,'frz');send1(p,{type:'freeze',duration:ms});
  const fb=document.getElementById('fb-'+p.cc);
  if(fb){fb.style.transition='none';fb.style.width='100%';void fb.offsetWidth;fb.style.transition=`width ${ms}ms linear`;fb.style.width='0%';}
  setTimeout(()=>{p.frozen=false;setPSt(p,'');send1(p,{type:'unfreeze'});},ms);
}

// ── HUD / PLAYER STATUS ──────────────────────────────────
function buildHUD(){
  const strip=document.getElementById('hud-strip');
  const act=players.filter(p=>!p.dc);
  strip.style.gridTemplateColumns=`repeat(${act.length||1},1fr)`;strip.innerHTML='';
  act.forEach(p=>{
    const d=document.createElement('div');d.className='phud '+p.cc;d.id='hud-'+p.cc;
    d.innerHTML=`<div class="hav">${p.avatar}</div><div class="hn">${p.name}</div><div class="hs">${p.score}</div><div class="hr">#${rank(p)}</div><div class="fbar" id="fb-${p.cc}"></div>`;
    strip.appendChild(d);
  });
}
function updateHUD(){players.filter(p=>!p.dc).forEach(p=>{const e=document.getElementById('hud-'+p.cc);if(!e)return;e.querySelector('.hs').textContent=p.score;e.querySelector('.hr').textContent='#'+rank(p);});}
function rank(pl){return [...players].filter(p=>!p.dc).sort((a,b)=>b.score-a.score).findIndex(p=>p===pl)+1;}

function buildPSRow(){
  const r=document.getElementById('pstrow');r.innerHTML='';
  players.filter(p=>!p.dc).forEach(p=>{
    const d=document.createElement('div');d.className='pst '+p.cc;d.id='pst-'+p.cc;d.textContent=p.avatar;r.appendChild(d);
  });
}
function setPSt(p,st){const e=document.getElementById('pst-'+p.cc);if(!e)return;e.className='pst '+p.cc;if(st)e.classList.add(st);}

// ── EFFECTS ─────────────────────────────────────────────
function explodeVeggie(ch){
  const obj=document.getElementById('vobj'),stage=document.getElementById('stage');
  const sr=stage.getBoundingClientRect(),or=obj.getBoundingClientRect();
  const cx=or.left+or.width/2-sr.left,cy=or.top+or.height/2-sr.top;
  ['✨','⭐','💫','🌟','💥','🎉','⚡','🔥'].forEach((em,i)=>{
    const p=document.createElement('div');p.className='particle';p.textContent=em;
    const a=(i/8)*Math.PI*2,d=65+Math.random()*75;
    p.style.left=cx+'px';p.style.top=cy+'px';p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');p.style.animationDuration=(.5+Math.random()*.3)+'s';
    stage.appendChild(p);setTimeout(()=>p.remove(),900);
  });
  const sw=document.createElement('div');sw.className='cring';sw.style.cssText=`left:${cx}px;top:${cy}px;width:40px;height:40px;margin-left:-20px;margin-top:-20px;border:4px solid ${ch};`;
  stage.appendChild(sw);setTimeout(()=>sw.remove(),700);
  obj.style.opacity='0';
}

function flashWin(ch){
  const wf=document.getElementById('wflash');wf.style.background=`radial-gradient(circle,${ch}55 0%,transparent 70%)`;wf.className='';void wf.offsetWidth;wf.className='show';
}

function showToast(msg,color){
  const el=document.getElementById('rtost');el.textContent=msg;el.style.color=color;el.style.textShadow=`0 0 20px ${color}`;el.className='';void el.offsetWidth;el.className='show';
}

// ── GAME OVER ────────────────────────────────────────────
function endGame(){
  gameRunning=false;
  const sorted=[...players].filter(p=>!p.dc).sort((a,b)=>b.score-a.score);
  const w=sorted[0];
  tone('win');
  bcast({type:'gameover',winnerId:w?.conn.peer,winnerName:w?.name,winnerAvatar:w?.avatar,scores:scoreMap()});
  document.getElementById('wav').textContent=w?.avatar||'🏆';
  document.getElementById('wtxt').innerHTML=`<span style="color:${w?.ch}">${w?.avatar} ${w?.name}</span><br>🏆 WINS!`;
  const sc=document.getElementById('wscores');sc.innerHTML='';
  sorted.forEach((p,i)=>{
    const c=document.createElement('div');c.className='wcard';c.style.borderColor=p.ch;c.style.background=p.ch+'22';
    c.innerHTML=`<div class="wav2">${['🥇','🥈','🥉','🎖️'][i]}</div><div class="wav2">${p.avatar}</div><div class="wn" style="color:${p.ch}">${p.name}</div><div class="ws">${p.score}pts</div>`;
    sc.appendChild(c);
  });
  document.getElementById('winner-banner').classList.add('show');
  document.getElementById('action-prompt').classList.remove('show');
  document.getElementById('tring').classList.remove('show');
}

// ── UI CONTROLS ──────────────────────────────────────────
document.getElementById('sbtn').addEventListener('click',()=>{soundOn=!soundOn;document.getElementById('sbtn').textContent=soundOn?'🔊':'🔇';if(soundOn)tone('incoming');});
document.getElementById('fbtn').addEventListener('click',()=>{const el=document.documentElement;if(!document.fullscreenElement)(el.requestFullscreen||el.webkitRequestFullscreen).call(el);else(document.exitFullscreen||document.webkitExitFullscreen).call(document);});
document.addEventListener('contextmenu',e=>e.preventDefault());
document.body.addEventListener('click',()=>{try{gctx();}catch(e){}},{once:true});
document.body.addEventListener('touchstart',()=>{try{gctx();}catch(e){}},{once:true});
window.addEventListener('load',initPeer);
</script>
