<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Veggie Attack! 🥕⚡ — Game Screen</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --yellow: #ffd700;
  --green:  #00ff87;
  --pink:   #ff2d78;
  --cyan:   #00d4ff;
  --purple: #a855f7;
  --orange: #ff6b35;
  --white:  #ffffff;
  --dark:   #0d0d1a;
}
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: radial-gradient(ellipse at 30% 20%, #1a1a4e 0%, #0d0d1a 100%);
  font-family: 'Fredoka One', cursive;
  color: #fff;
}

/* ─── STARS ─────────────────────────────────────── */
#stars {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
}
.star {
  position: absolute; border-radius: 50%;
  background: white; opacity: 0;
  animation: twinkle linear infinite;
}
@keyframes twinkle {
  0%,100% { opacity:0; transform:scale(0.5); }
  50%      { opacity:1; transform:scale(1); }
}

/* ─── PAIRING SCREEN ─────────────────────────────── */
#pairing-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; padding: 24px;
  background: radial-gradient(ellipse at 40% 30%, #1a1a5e 0%, #0d0d1a 100%);
}
#pairing-screen h1 {
  font-size: clamp(36px,6vw,72px);
  color: var(--yellow);
  text-shadow: 0 0 40px rgba(255,215,0,.7), 0 5px 0 rgba(100,60,0,.8);
  margin: 0; text-align: center;
  animation: titleFloat 2s ease infinite alternate;
}
@keyframes titleFloat {
  from { transform: translateY(0); }
  to   { transform: translateY(-8px); }
}
.veggie-row {
  display: flex; gap: 14px;
  font-size: clamp(32px,5vw,56px);
  animation: paradeFloat 1.5s ease infinite alternate;
}
@keyframes paradeFloat {
  from { transform: rotate(-3deg) translateY(0); }
  to   { transform: rotate(3deg) translateY(-6px); }
}

.pair-card {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 24px 32px;
  display: flex; gap: 36px;
  align-items: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  flex-wrap: wrap;
  justify-content: center;
  max-width: 700px; width: 100%;
}

.qr-side {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
#qrcode-container {
  background: white;
  border-radius: 16px;
  padding: 12px;
  box-shadow: 0 4px 24px rgba(255,215,0,0.3);
  width: 160px; height: 160px;
  display: flex; align-items: center; justify-content: center;
}
.qr-label {
  font-size: 13px; color: rgba(255,255,255,0.6);
  text-align: center; letter-spacing: 0.5px;
}

.code-side {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
.code-instruction {
  font-size: clamp(13px,2vw,17px);
  color: rgba(255,255,255,0.7);
  text-align: center; max-width: 200px;
}
#room-code-display {
  font-size: clamp(48px,8vw,80px);
  color: var(--yellow);
  letter-spacing: 8px;
  text-shadow: 0 0 30px rgba(255,215,0,.8), 0 4px 0 rgba(100,60,0,.9);
  background: rgba(0,0,0,0.3);
  border: 3px solid rgba(255,215,0,0.4);
  border-radius: 18px;
  padding: 8px 24px;
  font-family: 'Fredoka One', monospace;
  animation: codePulse 2s ease infinite alternate;
}
@keyframes codePulse {
  from { box-shadow: 0 0 20px rgba(255,215,0,0.2); }
  to   { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
}

.conn-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; color: rgba(255,255,255,0.7);
  background: rgba(0,0,0,0.3);
  border-radius: 20px; padding: 6px 16px;
}
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #ff4444;
  box-shadow: 0 0 8px #ff4444;
  transition: background 0.4s, box-shadow 0.4s;
}
.status-dot.connecting { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: dotBlink 0.7s ease infinite alternate; }
.status-dot.connected  { background: var(--green);  box-shadow: 0 0 8px var(--green); animation: none; }
@keyframes dotBlink { from { opacity:1; } to { opacity:0.3; } }

.controller-url {
  font-size: clamp(11px,1.8vw,14px);
  color: rgba(255,255,255,0.4);
  text-align: center; word-break: break-all;
  max-width: 500px;
}

/* ─── GAME LAYOUT ────────────────────────────────── */
#game-wrap {
  display: none;
  flex-direction: column;
  width: 100%; height: 100dvh;
  position: relative;
}
#game-wrap.show { display: flex; }

/* Top HUD */
#hud {
  position: relative; z-index: 10;
  height: 14%;
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
  flex-shrink: 0;
}
.hud-box {
  border-radius: 18px; padding: 6px 18px;
  display: flex; flex-direction: column; align-items: center;
  border: 2.5px solid rgba(255,255,255,0.25);
  backdrop-filter: blur(6px);
  min-width: 90px;
}
#score-box  { background: linear-gradient(135deg,#ffd700,#ff9500); }
#streak-box { background: linear-gradient(135deg,#ff2d78,#a855f7); }
.hud-label { font-size: 11px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
.hud-val   { font-size: 34px; line-height: 1; text-shadow: 0 2px 0 rgba(0,0,0,0.3); }
#score-box .hud-val  { color: #3d1a00; }
#streak-box .hud-val { color: #fff; }

#feedback-hud {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  font-size: clamp(20px,3.5vw,36px);
  color: #fff; white-space: nowrap;
  text-shadow: 0 0 20px rgba(255,255,255,.8), 0 3px 0 rgba(0,0,0,.5);
  pointer-events: none; opacity: 0;
  transition: opacity .2s;
}
#feedback-hud.show { opacity:1; animation: fbPop .4s ease; }
@keyframes fbPop {
  0%   { transform:translate(-50%,-50%) scale(0.5); opacity:0; }
  60%  { transform:translate(-50%,-50%) scale(1.12); opacity:1; }
  100% { transform:translate(-50%,-50%) scale(1); }
}

/* Controller badge */
#ctrl-badge {
  position: absolute; top: 10px; right: 16px; z-index: 20;
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,0.4); border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 12px; padding: 4px 10px;
  font-size: 12px; color: rgba(255,255,255,0.6);
}

/* Stage */
#stage {
  position: relative; z-index: 10;
  flex: 1; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

/* Action prompt */
#action-prompt {
  position: absolute; top: 8px; left: 50%;
  transform: translateX(-50%);
  z-index: 20; text-align: center;
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s;
}
#action-prompt.show { opacity: 1; }
#prompt-emoji {
  font-size: clamp(48px,9vw,90px);
  display: block; line-height: 1.1;
  animation: emojiFloat .8s ease infinite alternate;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.5));
}
@keyframes emojiFloat {
  from { transform: translateY(0); }
  to   { transform: translateY(-8px); }
}
#prompt-word {
  display: block;
  font-size: clamp(40px,8vw,88px);
  color: var(--yellow);
  text-shadow: 0 0 30px rgba(255,215,0,.8), 0 5px 0 rgba(100,60,0,.9);
  animation: wordPulse .5s ease infinite alternate;
  letter-spacing: 3px;
}
@keyframes wordPulse {
  from { transform: scale(1); }
  to   { transform: scale(1.06); }
}

/* Timer ring */
#timer-ring {
  position: absolute; top: 12px; right: 14px;
  z-index: 20; width: 60px; height: 60px; display: none;
}
#timer-ring.show { display: block; }
#timer-ring svg { transform: rotate(-90deg); }
#t-circle {
  fill: none; stroke: var(--cyan); stroke-width: 5;
  stroke-dasharray: 157; stroke-dashoffset: 0;
  stroke-linecap: round; transition: stroke-dashoffset .1s linear;
}
#timer-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: white;
}

/* Veggie */
#veggie-obj {
  position: absolute;
  font-size: 48px;
  transform: scale(0.1); opacity: 0;
  pointer-events: none; z-index: 15;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,.6));
  will-change: transform, opacity;
  animation: veggieWobble .4s ease infinite alternate;
}
@keyframes veggieWobble {
  from { filter: drop-shadow(0 8px 24px rgba(0,0,0,.6)) rotate(-6deg); }
  to   { filter: drop-shadow(0 8px 24px rgba(0,0,0,.6)) rotate(6deg); }
}

/* Ground */
#ground {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 44px;
  background: linear-gradient(180deg,#1a4a2e 0%,#0d2a1a 100%);
  border-top: 3px solid #00ff87;
  box-shadow: 0 -8px 32px rgba(0,255,135,.25);
  z-index: 1;
}

/* Particles */
.particle {
  position: absolute; pointer-events: none; z-index: 50;
  font-size: 28px; animation: pflyOut .7s ease-out forwards;
}
@keyframes pflyOut {
  0%   { transform: translate(0,0) scale(1); opacity:1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity:0; }
}
.shockwave {
  position: absolute; border-radius: 50%;
  border: 4px solid var(--yellow);
  pointer-events: none; z-index: 40;
  animation: swAnim .6s ease-out forwards;
}
@keyframes swAnim {
  0%   { transform:scale(0); opacity:1; }
  100% { transform:scale(4); opacity:0; }
}

/* Flashes */
#miss-flash, #win-flash {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 60; opacity: 0;
}
#miss-flash.show { background: rgba(233,69,96,.35); animation: flashFade .5s ease forwards; }
#win-flash.show  { background: radial-gradient(circle, rgba(255,215,0,.35) 0%, transparent 70%); animation: flashFade .5s ease forwards; }
@keyframes flashFade { 0%,30% { opacity:1; } 100% { opacity:0; } }

/* Speed badge */
#speed-badge {
  position: absolute; top: 10px; left: 12px; z-index: 20;
  background: rgba(0,0,0,.5); border: 2px solid var(--cyan);
  border-radius: 12px; padding: 4px 12px;
  font-size: 14px; color: var(--cyan); display: none;
}
#speed-badge.show { display: block; }

/* No-controller overlay */
#no-ctrl-overlay {
  position: absolute; inset: 0; z-index: 80;
  background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
#no-ctrl-overlay.show { display: flex; }
#no-ctrl-overlay .msg {
  font-size: clamp(22px,4vw,40px);
  color: var(--yellow); text-align: center;
  text-shadow: 0 0 20px rgba(255,215,0,.6);
}
#no-ctrl-overlay .sub {
  font-size: clamp(14px,2.5vw,22px);
  color: rgba(255,255,255,.65); text-align: center;
}

/* ─── GAME OVER ──────────────────────────────────── */
#gameover-screen {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.85); backdrop-filter: blur(10px);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
  padding: 24px;
}
#gameover-screen.show { display: flex; }
#gameover-screen h2 {
  font-size: clamp(36px,7vw,64px); color: var(--yellow); margin: 0;
  text-shadow: 0 0 30px rgba(255,215,0,.7);
}
.final-info { font-size: clamp(18px,3.5vw,32px); color: #fff; text-align: center; }
#play-again-btn {
  background: linear-gradient(145deg,#00d4ff,#00ff87);
  border: 4px solid rgba(255,255,255,.4); border-radius: 28px;
  padding: 14px 44px;
  font-size: clamp(20px,4vw,34px); font-family: 'Fredoka One', cursive;
  color: #003; cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,80,80,.8), 0 10px 25px rgba(0,212,255,.4);
  touch-action: manipulation;
}
#play-again-btn:active { transform: translateY(4px); }

/* Fullscreen + sound btns */
.ui-btn {
  position: fixed; z-index: 300;
  background: rgba(255,255,255,.1);
  border: 1.5px solid rgba(255,255,255,.2);
  border-radius: 12px; padding: 7px 13px;
  font-size: 14px; color: rgba(255,255,255,.5);
  cursor: pointer; font-family: 'Fredoka One', cursive;
  touch-action: manipulation;
}
#sound-btn    { bottom: 14px; right: 14px; }
#fullscr-btn  { bottom: 14px; right: 90px; }
</style>
</head>
<body>

<div id="stars"></div>

<button class="ui-btn" id="sound-btn">🔊</button>
<button class="ui-btn" id="fullscr-btn">⛶</button>

<!-- ── PAIRING SCREEN ── -->
<div id="pairing-screen">
  <div class="veggie-row">🥕🍅🥦🥔🌽🍆</div>
  <h1>Veggie Attack! ⚡</h1>

  <div class="pair-card">
    <div class="qr-side">
      <div id="qrcode-container"><div id="qrcode"></div></div>
      <div class="qr-label">📱 Scan with phone</div>
    </div>
    <div class="code-side">
      <div class="code-instruction">Or open controller &amp; enter code:</div>
      <div id="room-code-display">····</div>
      <div class="conn-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Setting up…</span>
      </div>
    </div>
  </div>

  <div class="controller-url" id="ctrl-url-hint"></div>
</div>

<!-- ── GAME WRAP ── -->
<div id="game-wrap">

  <!-- HUD -->
  <div id="hud">
    <div class="hud-box" id="score-box">
      <div class="hud-label">⭐ Score</div>
      <div class="hud-val" id="score-val">0</div>
    </div>
    <div id="feedback-hud"></div>
    <div class="hud-box" id="streak-box">
      <div class="hud-label">🔥 Streak</div>
      <div class="hud-val" id="streak-val">0</div>
    </div>
  </div>

  <!-- Controller badge -->
  <div id="ctrl-badge">
    <div class="status-dot connected" id="game-dot"></div>
    <span id="game-ctrl-status">Controller connected</span>
  </div>

  <!-- Stage -->
  <div id="stage">
    <div id="speed-badge">⚡ FAST!</div>

    <div id="action-prompt">
      <span id="prompt-emoji">👊</span>
      <span id="prompt-word">PUNCH!</span>
    </div>

    <div id="timer-ring">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="25" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="5"/>
        <circle id="t-circle" cx="30" cy="30" r="25"/>
      </svg>
      <div id="timer-num">3</div>
    </div>

    <div id="veggie-obj">🥕</div>
    <div id="miss-flash"></div>
    <div id="win-flash"></div>
    <div id="ground"></div>

    <!-- Disconnected overlay -->
    <div id="no-ctrl-overlay">
      <div class="msg">📱 Controller disconnected</div>
      <div class="sub">Reconnecting…<br>Room code: <strong id="overlay-code">····</strong></div>
    </div>
  </div>

</div>

<!-- ── GAME OVER ── -->
<div id="gameover-screen">
  <div style="font-size:64px">🏆</div>
  <h2>Amazing!</h2>
  <div class="final-info" id="final-info">Score: 0 · Streak: 0</div>
  <button id="play-again-btn" onclick="resetGame()">🔄 Play Again!</button>
</div>

<script>
// ════════════════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════════════════
const VEGGIES = [
  { name:'Carrot',   emoji:'🥕', glow:'rgba(255,122,0,.6)'  },
  { name:'Tomato',   emoji:'🍅', glow:'rgba(255,51,51,.6)'  },
  { name:'Broccoli', emoji:'🥦', glow:'rgba(0,204,68,.6)'   },
  { name:'Potato',   emoji:'🥔', glow:'rgba(204,136,0,.6)'  },
  { name:'Eggplant', emoji:'🍆', glow:'rgba(119,34,204,.6)' },
  { name:'Corn',     emoji:'🌽', glow:'rgba(255,204,0,.6)'  },
];
const ACTIONS = [
  { id:'punch', word:'PUNCH!',  emoji:'👊' },
  { id:'smash', word:'SMASH!',  emoji:'💥' },
  { id:'chop',  word:'CHOP!',   emoji:'🪓' },
  { id:'stomp', word:'STOMP!',  emoji:'👣' },
  { id:'kick',  word:'KICK!',   emoji:'🦵' },
  { id:'jump',  word:'JUMP!',   emoji:'⬆️'  },
  { id:'duck',  word:'DUCK!',   emoji:'⬇️'  },
  { id:'block', word:'BLOCK!',  emoji:'🛡️' },
  { id:'pull',  word:'PULL!',   emoji:'🤏' },
  { id:'spin',  word:'SPIN!',   emoji:'🔄' },
  { id:'slap',  word:'SLAP!',   emoji:'🖐️' },
  { id:'wave',  word:'WAVE!',   emoji:'👋' },
];

// ════════════════════════════════════════════════════════
//  STARS
// ════════════════════════════════════════════════════════
(function initStars() {
  const c = document.getElementById('stars');
  for (let i=0;i<70;i++) {
    const s = document.createElement('div'); s.className='star';
    const sz = Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*70}%;animation-duration:${1.5+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

// ════════════════════════════════════════════════════════
//  AUDIO (Web Audio API synth)
// ════════════════════════════════════════════════════════
let audioCtx = null;
let soundOn = true;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(type) {
  if (!soundOn) return;
  try {
    const ctx = getCtx();
    const now = ctx.currentTime;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (type==='punch') {
      o.type='sawtooth'; o.frequency.setValueAtTime(200,now); o.frequency.exponentialRampToValueAtTime(80,now+.12);
      g.gain.setValueAtTime(.6,now); g.gain.exponentialRampToValueAtTime(.001,now+.15);
      o.start(); o.stop(now+.15);
    } else if (type==='smash') {
      o.type='square'; o.frequency.setValueAtTime(300,now); o.frequency.exponentialRampToValueAtTime(50,now+.2);
      g.gain.setValueAtTime(.7,now); g.gain.exponentialRampToValueAtTime(.001,now+.2);
      o.start(); o.stop(now+.2);
      const buf=ctx.createBuffer(1,ctx.sampleRate*.15,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const src=ctx.createBufferSource(); const ng=ctx.createGain();
      src.buffer=buf; src.connect(ng); ng.connect(ctx.destination);
      ng.gain.setValueAtTime(.4,now); ng.gain.exponentialRampToValueAtTime(.001,now+.15); src.start();
    } else if (type==='stomp') {
      o.type='sine'; o.frequency.setValueAtTime(120,now); o.frequency.exponentialRampToValueAtTime(40,now+.18);
      g.gain.setValueAtTime(.8,now); g.gain.exponentialRampToValueAtTime(.001,now+.2);
      o.start(); o.stop(now+.2);
    } else if (type==='jump') {
      o.type='sine'; o.frequency.setValueAtTime(300,now); o.frequency.exponentialRampToValueAtTime(800,now+.15);
      g.gain.setValueAtTime(.4,now); g.gain.exponentialRampToValueAtTime(.001,now+.2);
      o.start(); o.stop(now+.2);
    } else if (type==='whoosh') {
      const buf=ctx.createBuffer(1,ctx.sampleRate*.25,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const src=ctx.createBufferSource(); const f=ctx.createBiquadFilter();
      f.type='bandpass'; f.frequency.value=1500; f.Q.value=.5;
      const ng=ctx.createGain(); src.buffer=buf; src.connect(f); f.connect(ng); ng.connect(ctx.destination);
      ng.gain.setValueAtTime(.3,now); ng.gain.setValueAtTime(.6,now+.05); ng.gain.exponentialRampToValueAtTime(.001,now+.25); src.start();
      o.start(); o.stop(now+.01);
    } else if (type==='success') {
      [523,659,784].forEach((fr,i)=>{
        const oc=ctx.createOscillator(); const gc=ctx.createGain();
        oc.connect(gc); gc.connect(ctx.destination); oc.type='sine'; oc.frequency.value=fr;
        gc.gain.setValueAtTime(0,now+i*.05); gc.gain.linearRampToValueAtTime(.35,now+i*.05+.02); gc.gain.exponentialRampToValueAtTime(.001,now+i*.05+.3);
        oc.start(now+i*.05); oc.stop(now+i*.05+.3);
      });
      o.start(); o.stop(now+.01);
    } else if (type==='error') {
      o.type='square'; o.frequency.setValueAtTime(200,now); o.frequency.setValueAtTime(150,now+.1);
      g.gain.setValueAtTime(.4,now); g.gain.exponentialRampToValueAtTime(.001,now+.25);
      o.start(); o.stop(now+.25);
    } else if (type==='incoming') {
      o.type='sine'; o.frequency.setValueAtTime(200,now); o.frequency.linearRampToValueAtTime(400,now+.3);
      g.gain.setValueAtTime(.2,now); g.gain.setValueAtTime(.35,now+.15); g.gain.exponentialRampToValueAtTime(.001,now+.35);
      o.start(); o.stop(now+.35);
    } else if (type==='connect') {
      [400,600,800].forEach((fr,i)=>{
        const oc=ctx.createOscillator(); const gc=ctx.createGain();
        oc.connect(gc); gc.connect(ctx.destination); oc.type='sine'; oc.frequency.value=fr;
        gc.gain.setValueAtTime(0,now+i*.08); gc.gain.linearRampToValueAtTime(.3,now+i*.08+.02); gc.gain.exponentialRampToValueAtTime(.001,now+i*.08+.25);
        oc.start(now+i*.08); oc.stop(now+i*.08+.25);
      });
      o.start(); o.stop(now+.01);
    } else { o.start(); o.stop(now+.01); }
  } catch(e) {}
}
function speak(text) {
  if (!soundOn) return;
  try {
    const u = new SpeechSynthesisUtterance(text.replace('!',''));
    u.rate=.85; u.pitch=1.3; u.volume=.9;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

// ════════════════════════════════════════════════════════
//  PEERJS — ROOM CODE SETUP
// ════════════════════════════════════════════════════════
let peer = null;
let conn = null;
let roomCode = '';

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='';
  for(let i=0;i<4;i++) c += chars[Math.floor(Math.random()*chars.length)];
  return c;
}

function initPeer() {
  roomCode = genCode();
  const peerId = 'VEGGIE-' + roomCode;

  document.getElementById('room-code-display').textContent = roomCode;
  document.getElementById('overlay-code').textContent = roomCode;
  setStatus('connecting', 'Registering…');

  // Build controller URL
  const base = window.location.href.replace(/index\.html.*$/, '').replace(/\/$/, '');
  const ctrlUrl = base + '/controller.html?room=' + roomCode;
  document.getElementById('ctrl-url-hint').textContent = '📲 ' + ctrlUrl;

  // QR code
  try {
    document.getElementById('qrcode').innerHTML = '';
    new QRCode(document.getElementById('qrcode'), {
      text: ctrlUrl,
      width: 136, height: 136,
      colorDark: '#000000', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) { console.warn('QR error', e); }

  // Init PeerJS
  peer = new Peer(peerId, {
    debug: 0,
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
      ]
    }
  });

  peer.on('open', (id) => {
    console.log('PeerJS open:', id);
    setStatus('waiting', 'Waiting for controller…');
  });

  peer.on('connection', (c) => {
    if (conn) { c.close(); return; } // Only 1 controller
    conn = c;
    setupConn(conn);
  });

  peer.on('error', (err) => {
    console.error('PeerJS error:', err);
    if (err.type === 'unavailable-id') {
      // Try a new code
      setTimeout(initPeer, 500);
    } else {
      setStatus('waiting', 'Connection error – retrying…');
      setTimeout(initPeer, 3000);
    }
  });

  peer.on('disconnected', () => {
    setStatus('waiting', 'Reconnecting…');
    peer.reconnect();
  });
}

function setupConn(c) {
  c.on('open', () => {
    console.log('Controller connected!');
    setStatus('connected', '🎮 Controller connected!');
    playTone('connect');
    setTimeout(() => {
      document.getElementById('pairing-screen').style.display = 'none';
      document.getElementById('game-wrap').classList.add('show');
      document.getElementById('no-ctrl-overlay').classList.remove('show');
      startGame();
    }, 800);
  });

  c.on('data', (data) => {
    console.log('Received:', data);
    if (data.type === 'action') {
      handleRemoteAction(data.id);
    }
  });

  c.on('close', () => {
    console.log('Controller disconnected');
    conn = null;
    if (gameRunning) {
      clearInterval(timerInterval);
      clearTimeout(spawnTimeout);
      roundActive = false;
      document.getElementById('no-ctrl-overlay').classList.add('show');
      document.getElementById('game-ctrl-status').textContent = 'Disconnected';
    }
  });

  c.on('error', (err) => {
    console.error('Conn error:', err);
    conn = null;
  });
}

function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot ' + (state==='connected'?'connected':state==='connecting'?'connecting':'');
  txt.textContent = text;
}

function sendFeedback(result, score) {
  if (conn && conn.open) {
    try { conn.send({ type:'feedback', result, score }); } catch(e) {}
  }
}

// ════════════════════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════════════════════
let score=0, streak=0, bestStreak=0, speed=1;
let currentAction=null, roundActive=false, gameRunning=false;
let timerInterval=null, spawnTimeout=null, veggieAnimTimer=null;

function startGame() {
  score=0; streak=0; bestStreak=0; speed=1;
  updateHUD();
  gameRunning=true;
  document.getElementById('gameover-screen').classList.remove('show');
  scheduleNext(600);
}

function resetGame() {
  document.getElementById('gameover-screen').classList.remove('show');
  startGame();
}

function scheduleNext(delay) {
  clearTimeout(spawnTimeout);
  spawnTimeout = setTimeout(spawnRound, delay);
}

function spawnRound() {
  if (!gameRunning) return;
  const veggie  = VEGGIES[Math.floor(Math.random()*VEGGIES.length)];
  currentAction = ACTIONS[Math.floor(Math.random()*ACTIONS.length)];

  // Tell controller what action is needed
  if (conn && conn.open) {
    try { conn.send({ type:'round', actionId: currentAction.id, actionWord: currentAction.word, actionEmoji: currentAction.emoji }); } catch(e) {}
  }

  showPrompt(currentAction);
  animateVeggie(veggie);
  startTimer();
  roundActive = true;
  speak(currentAction.word);
  playTone('incoming');
}

function showPrompt(action) {
  document.getElementById('prompt-emoji').textContent = action.emoji;
  document.getElementById('prompt-word').textContent  = action.word;
  const el = document.getElementById('action-prompt');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}

function animateVeggie(veggie) {
  const obj = document.getElementById('veggie-obj');
  const xp   = 15 + Math.random()*70;
  obj.style.cssText = `left:${xp}%;top:10%;opacity:0;transform:translate(-50%,0) scale(0.1) rotate(0deg);transition:none;font-size:48px;`;
  obj.textContent = veggie.emoji;
  obj.style.filter = `drop-shadow(0 0 20px ${veggie.glow})`;
  void obj.offsetWidth;
  const dur = Math.max(1000, 2800-(speed-1)*220);
  obj.style.transition = `transform ${dur}ms cubic-bezier(.2,0,.8,1), opacity ${dur}ms ease`;
  obj.style.opacity='1';
  obj.style.transform=`translate(-50%,0) scale(3) rotate(${(Math.random()-.5)*40}deg)`;
  clearTimeout(veggieAnimTimer);
  veggieAnimTimer = setTimeout(()=>{ obj.style.opacity='0'; }, dur*.9);
}

function startTimer() {
  clearInterval(timerInterval);
  const total = Math.max(2, 3.5-(speed-1)*.2);
  let left = total;
  const circ = 157;
  const ring = document.getElementById('timer-ring');
  const tc   = document.getElementById('t-circle');
  const tn   = document.getElementById('timer-num');
  ring.classList.add('show');
  tc.style.strokeDashoffset = 0;
  tc.style.stroke = '#00d4ff';
  tn.textContent = Math.ceil(left);
  const tick = 50;
  let ticks = 0;
  timerInterval = setInterval(()=>{
    ticks++;
    left = total-(ticks*tick/1000);
    const ratio = Math.max(0, left/total);
    tc.style.strokeDashoffset = circ*(1-ratio);
    tn.textContent = Math.ceil(Math.max(0,left));
    if (ratio<.4) tc.style.stroke='#ff2d78';
    else if (ratio<.65) tc.style.stroke='#ffd700';
    else tc.style.stroke='#00d4ff';
    if (left<=0) { clearInterval(timerInterval); if (roundActive) missRound(); }
  }, tick);
}

function handleRemoteAction(actionId) {
  if (!roundActive || !gameRunning) return;
  if (currentAction && actionId === currentAction.id) {
    hitRound();
  } else {
    wrongRound();
  }
}

function hitRound() {
  roundActive=false;
  clearInterval(timerInterval);
  document.getElementById('timer-ring').classList.remove('show');
  score += 10+streak; streak++;
  if (streak>bestStreak) bestStreak=streak;
  if (streak%5===0) speed=Math.min(8,speed+1);
  updateHUD();
  showFeedback(getSuccessMsg(), true);
  playTone('success');
  explodeVeggie();
  flash('win');
  sendFeedback('hit', score);
  if (speed>=3) {
    const sb=document.getElementById('speed-badge');
    sb.textContent=speed>=6?'🔥 INSANE!':speed>=4?'⚡ FAST!':'🚀 SPEEDY!';
    sb.classList.add('show');
  }
  setTimeout(()=>{
    document.getElementById('action-prompt').classList.remove('show');
    document.getElementById('veggie-obj').style.opacity='0';
    scheduleNext(900);
  }, 500);
}

function wrongRound() {
  playTone('error');
  showFeedback('Oops! Try again! 😅', false);
  streak=0; updateHUD();
  sendFeedback('wrong', score);
}

function missRound() {
  roundActive=false;
  document.getElementById('timer-ring').classList.remove('show');
  document.getElementById('action-prompt').classList.remove('show');
  flash('miss');
  playTone('error');
  showFeedback("Time's up! ⏰", false);
  streak=0; updateHUD();
  document.getElementById('veggie-obj').style.opacity='0';
  sendFeedback('miss', score);
  setTimeout(()=>scheduleNext(1000), 600);
}

function flash(type) {
  const el = document.getElementById(type==='win'?'win-flash':'miss-flash');
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}

function explodeVeggie() {
  const obj   = document.getElementById('veggie-obj');
  const stage = document.getElementById('stage');
  const sr    = stage.getBoundingClientRect();
  const or    = obj.getBoundingClientRect();
  const cx    = or.left+or.width/2-sr.left;
  const cy    = or.top+or.height/2-sr.top;
  ['✨','⭐','💫','🌟','💥','🎉','⚡'].forEach((_,i)=>{
    const p=document.createElement('div'); p.className='particle';
    p.textContent=['✨','⭐','💫','🌟','💥','🎉','⚡'][i];
    const a=(i/7)*Math.PI*2; const d=60+Math.random()*70;
    p.style.left=cx+'px'; p.style.top=cy+'px';
    p.style.setProperty('--dx',Math.cos(a)*d+'px');
    p.style.setProperty('--dy',Math.sin(a)*d+'px');
    p.style.animationDuration=(.5+Math.random()*.3)+'s';
    stage.appendChild(p); setTimeout(()=>p.remove(),1000);
  });
  const sw=document.createElement('div'); sw.className='shockwave';
  sw.style.cssText=`left:${cx}px;top:${cy}px;width:40px;height:40px;margin-left:-20px;margin-top:-20px;`;
  stage.appendChild(sw); setTimeout(()=>sw.remove(),700);
  obj.style.opacity='0';
}

function showFeedback(msg, positive) {
  const fb=document.getElementById('feedback-hud');
  fb.textContent=msg;
  fb.style.color=positive?'#ffd700':'#ff6b6b';
  fb.classList.remove('show'); void fb.offsetWidth; fb.classList.add('show');
  clearTimeout(fb._t);
  fb._t=setTimeout(()=>fb.classList.remove('show'),1500);
}

function updateHUD() {
  document.getElementById('score-val').textContent  = score;
  document.getElementById('streak-val').textContent = streak;
  if (streak>0) {
    const sb=document.getElementById('streak-box');
    sb.style.animation='none'; void sb.offsetWidth; sb.style.animation='';
  }
}

function getSuccessMsg() {
  if (streak>=5) return '🔥 ON FIRE! 🔥';
  if (streak>=3) return `🎉 COMBO x${streak}!`;
  const msgs=['Awesome! 🎉','Amazing! 🌟','PERFECT! ⭐','Super! 🦸','Woohoo! 🎊','Brilliant! 💥','YES! 🙌'];
  return msgs[Math.floor(Math.random()*msgs.length)];
}

// ════════════════════════════════════════════════════════
//  UI CONTROLS
// ════════════════════════════════════════════════════════
document.getElementById('sound-btn').addEventListener('click', ()=>{
  soundOn=!soundOn;
  document.getElementById('sound-btn').textContent=soundOn?'🔊':'🔇';
  if(soundOn) playTone('incoming');
});
document.getElementById('fullscr-btn').addEventListener('click', ()=>{
  const el=document.documentElement;
  if (!document.fullscreenElement) {
    (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
    document.getElementById('fullscr-btn').textContent='✕';
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    document.getElementById('fullscr-btn').textContent='⛶';
  }
});

document.addEventListener('contextmenu', e=>e.preventDefault());

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
window.addEventListener('load', ()=>{
  // Unlock audio on first click
  document.body.addEventListener('click', ()=>{ try{ getCtx(); }catch(e){} }, { once:true });
  document.body.addEventListener('touchstart', ()=>{ try{ getCtx(); }catch(e){} }, { once:true });
  initPeer();
});
</script>
